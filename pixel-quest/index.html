<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL QUEST</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; image-rendering:pixelated; }
  body { background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Press Start 2P',monospace; overflow:hidden; }
  #wrapper { display:flex; flex-direction:column; align-items:stretch; gap:0; width:808px; }
  #hud { background:#000; border:4px solid #444; border-bottom:2px solid #333; padding:8px 16px; display:flex; justify-content:space-between; align-items:center; font-size:10px; color:#fff; gap:8px; }
  .hud-block { display:flex; flex-direction:column; gap:4px; min-width:100px; }
  .hud-label { color:#f0bc3c; font-size:7px; }
  .hud-val { color:#fff; font-size:11px; }
  #lives-display { color:#e63232; letter-spacing:4px; }
  #timer-val { color:#fff; }
  #timer-val.urgent { color:#e63232; animation:blink 0.5s infinite; }
  @keyframes blink { 50%{opacity:0;} }
  #gameCanvas { display:block; cursor:none; background:#5c94fc; }
  #screen { position:absolute; top:0;left:0;right:0;bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.88); z-index:100; gap:24px; padding:32px; }
  #screen.hidden { display:none; }
  .screen-title { font-size:28px; color:#f0bc3c; text-shadow:4px 4px 0 #c84b11; text-align:center; line-height:1.6; letter-spacing:2px; }
  .screen-subtitle { font-size:10px; color:#aaa; text-align:center; line-height:2; }
  .screen-btn { font-family:'Press Start 2P',monospace; font-size:12px; padding:12px 28px; background:#f0bc3c; color:#000; border:none; cursor:pointer; clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px)); transition:background 0.1s,transform 0.1s; }
  .screen-btn:hover { background:#fff; transform:scale(1.05); }
  .screen-btn.secondary { background:#555; color:#fff; margin-top:-8px; }
  .screen-btn.secondary:hover { background:#888; }
  .save-slots { display:flex; flex-direction:column; gap:10px; width:100%; max-width:400px; }
  .save-slot { font-family:'Press Start 2P',monospace; font-size:9px; padding:10px 16px; background:#111; border:2px solid #444; color:#ccc; cursor:pointer; display:flex; justify-content:space-between; align-items:center; transition:border-color 0.1s,background 0.1s; }
  .save-slot:hover { border-color:#f0bc3c; background:#1a1a1a; color:#fff; }
  .save-slot .slot-name { color:#f0bc3c; }
  .save-slot .slot-empty { color:#555; font-size:8px; }
  .level-complete-stats { display:flex; flex-direction:column; gap:12px; font-size:10px; color:#ccc; width:320px; }
  .stat-row { display:flex; justify-content:space-between; border-bottom:1px dotted #333; padding-bottom:6px; }
  .stat-row .val { color:#f0bc3c; }
  #scanlines { position:absolute; top:0;left:0;right:0;bottom:0; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px); z-index:50; }
  #canvas-wrap { position:relative; width:808px; height:488px; border-left:4px solid #444; border-right:4px solid #444; border-bottom:4px solid #444; border-top:2px solid #333; overflow:hidden; }
  #controls-bar { background:#000; border:4px solid #444; border-top:none; padding:6px 16px; display:flex; justify-content:center; gap:24px; font-size:7px; color:#555; }
  .ctrl { color:#888; }
  .ctrl span { color:#f0bc3c; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="hud">
    <div class="hud-block"><div class="hud-label">SCORE</div><div class="hud-val" id="score-val">000000</div></div>
    <div class="hud-block"><div class="hud-label">COINS</div><div class="hud-val" id="coins-val">x00</div></div>
    <div class="hud-block" style="text-align:center"><div class="hud-label">WORLD</div><div class="hud-val" id="world-val">1-1</div></div>
    <div class="hud-block" style="text-align:center"><div class="hud-label">TIME</div><div class="hud-val" id="timer-val">300</div></div>
    <div class="hud-block" style="text-align:right"><div class="hud-label">LIVES</div><div class="hud-val" id="lives-display">vvv</div></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="gameCanvas" width="800" height="480"></canvas>
    <div id="scanlines"></div>
    <div id="screen"></div>
  </div>
  <div id="controls-bar">
    <div class="ctrl"><span>arrow keys / WASD</span> Move + Jump</div>
    <div class="ctrl"><span>SPACE / Z</span> Jump</div>
    <div class="ctrl"><span>ESC / P</span> Pause</div>
    <div class="ctrl"><span>R</span> Restart</div>
  </div>
</div>
<script>
// ============================================================
// PIXEL QUEST  --  Configuration
// ============================================================
//
// Add your own levels by:
//   1. Creating a new .md file (see any existing level for the format)
//   2. Adding an entry to LEVEL_CONFIG below
//
// LEVEL_CONFIG fields:
//   file  (required)  path to .md file, e.g. 'levels/my-level.md'
//   name  (optional)  overrides the title in the md file
//
// NOTE: fetch() requires a web server -- open via http://localhost/...
//       not via file:// directly in the browser.
//
// Supported meta keys inside a .md file:
//   background  sky | cave | clouds | mirror   (default: sky)
//   time        countdown seconds               (default: 300)
//   boss        mirror                          (omit for normal levels)
//
// Map tile legend:
//   #   ground tile (solid, grass-topped)
//   B   brick platform tile
//   .   empty
//   P   player start  (place in the row the player stands on)
//   S   goal flagpole (place in the row the player walks toward)
//   C   coin          (place in the row ABOVE the platform)
//   E   enemy goomba  (place in the row ABOVE the platform)
//   T   turtle enemy (place in the row ABOVE the platform)
//   H   spike hazard  (place in the row ABOVE the platform it sits on)
//   Q   boss spawn    (used when boss: mirror is set)
// ============================================================
const LEVEL_CONFIG = [
  { file: 'levels/level-1.md', name: 'Grasslands'       },
  { file: 'levels/level-2.md', name: 'Underground Caves' },
  { file: 'levels/level-3.md', name: 'Sky Fortress'      },
  { file: 'levels/level-4.md', name: 'Mirror Hall'       },
];

// Runtime storage -- populated by loadAllLevels() on boot
const LEVEL_MARKDOWN = [];

// ============================================================
// ENGINE
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W = 800, H = 480, TILE = 32;
const GRAVITY = 0.55, JUMP_FORCE = -13, MOVE_SPEED = 3.8, FRICTION = 0.82;

// ============================================================
// AUDIO
// ============================================================
const SFX = (() => {
  let actx = null;
  function getCtx() {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    return actx;
  }
  function tone(freq, dur, vol=0.3, type='square', slide=0) {
    try {
      const ac=getCtx(), osc=ac.createOscillator(), g=ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type=type; osc.frequency.setValueAtTime(freq,ac.currentTime);
      if(slide) osc.frequency.linearRampToValueAtTime(slide,ac.currentTime+dur);
      g.gain.setValueAtTime(vol,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
      osc.start(ac.currentTime); osc.stop(ac.currentTime+dur);
    } catch(e){}
  }
  function noise(dur,vol=0.2,ff=1000) {
    try {
      const ac=getCtx(),sz=ac.sampleRate*dur,buf=ac.createBuffer(1,sz,ac.sampleRate);
      const d=buf.getChannelData(0); for(let i=0;i<sz;i++)d[i]=Math.random()*2-1;
      const src=ac.createBufferSource(),flt=ac.createBiquadFilter(),g=ac.createGain();
      src.buffer=buf; flt.type='bandpass'; flt.frequency.value=ff;
      g.gain.setValueAtTime(vol,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
      src.connect(flt); flt.connect(g); g.connect(ac.destination); src.start(); src.stop(ac.currentTime+dur);
    } catch(e){}
  }
  return {
    jump()       { tone(220,.05,.25,'square',440); tone(440,.08,.15,'square'); },
    land()       { noise(.06,.12,300); },
    coin()       { tone(1046,.07,.25,'sine'); setTimeout(()=>tone(1318,.07,.2,'sine'),60); setTimeout(()=>tone(1568,.12,.2,'sine'),120); },
    stomp()      { noise(.08,.3,200); tone(80,.1,.3,'sawtooth',40); },
    die()        { tone(440,.1,.3,'square'); setTimeout(()=>tone(330,.1,.3,'square'),100); setTimeout(()=>tone(220,.1,.3,'square'),200); setTimeout(()=>tone(110,.3,.3,'square'),300); },
    levelup()    { [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,.15,.25,'square'),i*100)); },
    gameover()   { [330,294,262,247,220].forEach((f,i)=>setTimeout(()=>tone(f,.2,.25,'sawtooth'),i*180)); },
    pause()      { tone(440,.05,.15,'sine',220); },
    resume()     { tone(220,.05,.15,'sine',440); },
    bump()       { tone(120,.08,.2,'square',80); },
    bossHit()    { tone(880,.04,.3,'square'); setTimeout(()=>tone(660,.08,.25,'sawtooth',330),50); },
    bossDefeat() { [880,1046,1318,1568,2093].forEach((f,i)=>setTimeout(()=>tone(f,.18,.3,'square'),i*120)); },
    bossPhase()  { tone(110,.3,.4,'sawtooth',55); setTimeout(()=>tone(220,.2,.3,'square'),200); },
    cloneAppear(){ tone(440,.05,.2,'sine',880); },
  };
})();
document.addEventListener('keydown', ()=>{try{const a=new(window.AudioContext||window.webkitAudioContext)();a.resume();a.close();}catch(e){}},{once:true});

// ============================================================
// SAVE / LOAD
// ============================================================
const SAVE_KEY='pixelquest_saves';
function getSaves(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||[{},{},{}];}catch{return[{},{},{}];}}
function writeSaves(s){localStorage.setItem(SAVE_KEY,JSON.stringify(s));}
function saveGame(slot){const s=getSaves();s[slot]={level:game.currentLevel,score:game.score,coins:game.coins,lives:game.lives,savedAt:new Date().toLocaleString()};writeSaves(s);}
function loadGame(slot){return getSaves()[slot]||null;}

// ============================================================
// LEVEL PARSER
// ============================================================
function parseMarkdownLevel(md) {
  const lines=md.split('\n'); const meta={}; let mapLines=[],inMap=false;
  for(const line of lines){
    if(line.startsWith('- ')&&!inMap){const m=line.match(/^- (\w+):\s*(.+)/);if(m)meta[m[1]]=m[2].trim();}
    if(line.includes('```')&&!inMap){inMap=true;continue;}
    if(line.includes('```')&&inMap){inMap=false;continue;}
    if(inMap)mapLines.push(line);
  }
  const tiles=[]; let playerStart={x:TILE,y:10*TILE};
  const enemies=[],coins=[],hazards=[]; let goalX=0,goalY=0;
  for(let row=0;row<mapLines.length;row++){
    tiles[row]=[];
    for(let col=0;col<mapLines[row].length;col++){
      const ch=mapLines[row][col]; tiles[row][col]='.';
      if     (ch==='#') tiles[row][col]='ground';
      else if(ch==='B') tiles[row][col]='brick';
      else if(ch==='P') playerStart={x:col*TILE,y:row*TILE-32};
      else if(ch==='S') {goalX=col*TILE;goalY=row*TILE;}
      else if(ch==='C') coins.push({x:col*TILE+8,y:(row+1)*TILE-20,collected:false,anim:0});
      else if(ch==='E') enemies.push({x:col*TILE,y:(row+1)*TILE-28,vx:-1.2,vy:0,alive:true,dir:-1,squishTimer:0,type:'goomba'});
      else if(ch==='T') enemies.push({x:col*TILE,y:(row+1)*TILE-30,vx:-1.0,vy:0,alive:true,dir:-1,squishTimer:0,type:'turtle',shellTimer:0,inShell:false,shellVx:0});
      else if(ch==='H') hazards.push({x:col*TILE,y:row*TILE});
      else if(ch==='Q') {meta._bossSpawnX=col*TILE;meta._bossSpawnY=row*TILE-32;}
    }
  }
  const mapWidth=Math.max(W/TILE,...mapLines.map(l=>l.length));
  for(let i=0;i<mapLines.length;i++) while(mapLines[i].length<mapWidth)mapLines[i]+='.';
  return {meta,tiles,playerStart,enemies,coins,hazards,goalX,goalY,width:mapWidth*TILE,height:mapLines.length*TILE};
}

// ============================================================
// PALETTE & DRAWING
// ============================================================
const PAL={
  groundTop:'#6aaa40',groundSide:'#56853a',groundFill:'#8B4513',
  brickFace:'#c84b11',brickMortar:'#8B3000',brickHigh:'#e05a20',
  pHat:'#e63232',pSkin:'#ffb347',pShirt:'#3a6fcc',pPants:'#5a3a1a',pShoe:'#3d2800',pEye:'#000',pMust:'#5a3a1a',
  gBrown:'#7a4b2a',gDark:'#4a2810',gFeet:'#3d1800',gEye:'#e0e0e0',
  coinY:'#f0bc3c',coinHi:'#fff06a',
  hazSpike:'#cccccc',hazBase:'#888888',
  rock1:'#4a3a6a',rock2:'#3a2a55',
  poleCol:'#aaaaaa',flagCol:'#e63232',
  dustCol:'rgba(200,180,140,0.7)',
};
function px(n){return Math.floor(n);}

function drawGroundTile(x,y){
  ctx.fillStyle=PAL.groundFill; ctx.fillRect(px(x),px(y),TILE,TILE);
  ctx.fillStyle=PAL.groundTop;  ctx.fillRect(px(x),px(y),TILE,6);
  ctx.fillStyle=PAL.groundSide; ctx.fillRect(px(x),px(y)+6,TILE,2);
  ctx.fillStyle='#7a3810'; ctx.fillRect(px(x),px(y)+10,TILE,2); ctx.fillRect(px(x),px(y)+20,TILE,2);
}
function drawBrickTile(x,y){
  ctx.fillStyle=PAL.brickFace; ctx.fillRect(px(x),px(y),TILE,TILE);
  ctx.fillStyle=PAL.brickMortar;
  ctx.fillRect(px(x),px(y)+8,TILE,2); ctx.fillRect(px(x),px(y)+20,TILE,2);
  ctx.fillRect(px(x)+14,px(y),2,8); ctx.fillRect(px(x)+14,px(y)+10,2,10); ctx.fillRect(px(x)+14,px(y)+22,2,10);
  ctx.fillRect(px(x),px(y)+10,14,10);
  ctx.fillStyle=PAL.brickHigh; ctx.fillRect(px(x)+1,px(y)+1,12,2); ctx.fillRect(px(x)+16,px(y)+11,14,2);
}
function drawPlayer(p,camX){
  const x=px(p.x-camX),y=px(p.y),flip=p.facing===-1;
  ctx.save(); if(flip){ctx.translate(x+20,y);ctx.scale(-1,1);}else ctx.translate(x,y);
  ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(2,28,16,4);
  ctx.fillStyle=PAL.pHat;   ctx.fillRect(2,0,16,4); ctx.fillRect(0,4,20,4);
  ctx.fillStyle=PAL.pSkin;  ctx.fillRect(2,8,16,10);
  ctx.fillStyle=PAL.pEye;   ctx.fillRect(12,10,3,3);
  ctx.fillStyle=PAL.pMust;  ctx.fillRect(4,14,12,3); ctx.fillRect(6,17,10,2);
  ctx.fillStyle=PAL.pShirt; ctx.fillRect(0,18,20,8);
  ctx.fillStyle=PAL.pPants; ctx.fillRect(2,22,8,4); ctx.fillRect(10,22,8,4);
  const fo=p.onGround?((p.runFrame||0)%2===0?0:2):0;
  ctx.fillStyle=PAL.pShoe; ctx.fillRect(0,26+fo,10,6); ctx.fillRect(10,26+(2-fo),10,6);
  ctx.fillStyle='#e0e0e0'; ctx.fillRect(8,20,4,2);
  ctx.restore();
}
function drawGoomba(e,camX){
  if(!e.alive&&e.squishTimer<=0)return;
  const x=px(e.x-camX),y=px(e.y+(e.alive?0:20));
  ctx.save(); ctx.translate(x,y);
  if(!e.alive){ctx.fillStyle=PAL.gBrown;ctx.fillRect(0,0,28,8);ctx.fillStyle=PAL.gDark;ctx.fillRect(2,2,24,4);ctx.restore();return;}
  ctx.fillStyle=PAL.gBrown; ctx.fillRect(2,4,24,20); ctx.fillRect(0,0,28,16);
  ctx.fillStyle=PAL.gDark;  ctx.fillRect(0,0,28,6);
  ctx.fillStyle=PAL.gEye;   ctx.fillRect(4,6,7,7); ctx.fillRect(17,6,7,7);
  ctx.fillStyle=PAL.gDark;  ctx.fillRect(7,8,3,4); ctx.fillRect(20,8,3,4); ctx.fillRect(3,5,8,2); ctx.fillRect(17,5,8,2);
  ctx.fillStyle=PAL.gFeet; const wf=Math.floor(Date.now()/200)%2; ctx.fillRect(0,24,10,6+wf*2); ctx.fillRect(18,24,10,6+(1-wf)*2);
  ctx.restore();
}
function drawTurtle(e,camX){
  if(!e.alive&&e.squishTimer<=0)return;
  const x=px(e.x-camX),y=px(e.y);
  ctx.save(); ctx.translate(x,y);
  if(!e.alive){
    // dead shell spinning
    ctx.fillStyle='#2a7030'; ctx.fillRect(1,6,26,18);
    ctx.fillStyle='#1a4a20'; ctx.fillRect(4,8,20,14);
    ctx.restore(); return;
  }
  if(e.inShell){
    // shell mode
    const bob=e.shellTimer>0?0:Math.sin(Date.now()*.008)*1;
    ctx.translate(0,bob);
    ctx.fillStyle='#2a7030'; ctx.fillRect(2,8,24,18); // shell body
    ctx.fillStyle='#1a4a20'; ctx.fillRect(5,10,18,14); // shell inner
    ctx.fillStyle='#3a9040'; // shell highlight lines
    ctx.fillRect(5,10,18,2); ctx.fillRect(5,14,18,2); ctx.fillRect(5,18,18,2);
    ctx.fillStyle='#4ab050'; ctx.fillRect(6,11,3,3); ctx.fillRect(13,11,3,3); ctx.fillRect(20,11,3,3);
    ctx.restore(); return;
  }
  const flip=e.dir===1;
  if(flip){ctx.translate(28,0);ctx.scale(-1,1);}
  // legs
  const wf=Math.floor(Date.now()/200)%2;
  ctx.fillStyle='#3a8040';
  ctx.fillRect(-2,22,8,8+wf*2); ctx.fillRect(18,22,8,8+(1-wf)*2);
  // shell
  ctx.fillStyle='#2a7030'; ctx.fillRect(2,6,24,20);
  ctx.fillStyle='#1a4a20'; ctx.fillRect(5,8,18,16);
  ctx.fillStyle='#3a9040';
  ctx.fillRect(5,8,18,2); ctx.fillRect(5,12,18,2); ctx.fillRect(5,16,18,2);
  // head
  ctx.fillStyle='#4ab050'; ctx.fillRect(2,0,12,8);
  ctx.fillStyle='#000'; ctx.fillRect(10,2,3,3); // eye
  ctx.fillStyle='#fff'; ctx.fillRect(10,2,2,2); // eye white
  ctx.restore();
}

function drawCoin(c,camX){
  if(c.collected)return;
  const bob=Math.sin(Date.now()*0.005+c.x)*3, x=px(c.x-camX), y=px(c.y+bob);
  ctx.fillStyle=PAL.coinY;  ctx.beginPath(); ctx.arc(x+8,y+8,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=PAL.coinHi; ctx.beginPath(); ctx.arc(x+6,y+6,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=PAL.coinY;  ctx.fillRect(x+6,y+3,4,10);
  ctx.fillStyle='#fff8';    ctx.fillRect(x+5,y+4,2,2);
}
function drawHazard(h,camX){
  const x=px(h.x-camX), base=px(h.y+TILE), baseH=6, tipH=TILE-baseH-2;
  ctx.fillStyle=PAL.hazBase; ctx.fillRect(x+1,base-baseH,TILE-2,baseH);
  ctx.fillStyle=PAL.hazSpike;
  const sw=10,gap=1,tw=3*sw+2*gap,sx0=x+(TILE-tw)/2;
  for(let i=0;i<3;i++){
    const sx=sx0+i*(sw+gap);
    ctx.beginPath(); ctx.moveTo(sx,base-baseH); ctx.lineTo(sx+sw,base-baseH); ctx.lineTo(sx+sw/2,base-baseH-tipH); ctx.fill();
    ctx.fillStyle='#ffffffaa'; ctx.fillRect(px(sx+sw/2)-1,base-baseH-tipH+2,2,tipH/2); ctx.fillStyle=PAL.hazSpike;
  }
}
function drawGoal(gx,gy,camX){
  const x=px(gx-camX); if(x<-60||x>W+60)return;
  const gs=px(gy+TILE), ph=160, pt=gs-ph;
  ctx.fillStyle=PAL.poleCol; ctx.fillRect(x+14,pt,4,ph);
  ctx.fillStyle=PAL.flagCol; const fb=Math.sin(Date.now()*0.003)*3;
  ctx.beginPath(); ctx.moveTo(x+18,pt+4+fb); ctx.lineTo(x+46,pt+18+fb); ctx.lineTo(x+18,pt+32+fb); ctx.fill();
  ctx.fillStyle='#f0bc3c'; ctx.beginPath(); ctx.arc(x+16,pt,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#888'; ctx.fillRect(x+4,gs-8,24,8);
}

// ============================================================
// BACKGROUNDS
// ============================================================
function drawBackground(bg,camX){
  if(bg==='sky')drawSkyBG(camX);
  else if(bg==='cave')drawCaveBG(camX);
  else if(bg==='clouds')drawCloudsBG(camX);
  else if(bg==='mirror')drawMirrorBG();
  else drawSkyBG(camX);
}
function drawSkyBG(camX){
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#2a6fe8'); g.addColorStop(1,'#8bbcff');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const CD=[{sp:420,off:0,y:55,par:.25},{sp:420,off:180,y:38,par:.30},{sp:500,off:90,y:75,par:.20},{sp:380,off:260,y:48,par:.28}];
  for(const d of CD){const sc=camX*d.par,m=160,f=Math.floor((sc-m-d.off)/d.sp),l=Math.ceil((sc+W+m-d.off)/d.sp);for(let s=f;s<=l;s++)drawCloud(d.off+s*d.sp-sc,d.y);}
}
function drawSkyHills(camX,gY){
  ctx.fillStyle='#3a7030'; const lg={sp:340,off:120,par:.35,r:150};

  const GD=[{sp:140,off:60,par:.15,w:30,h:[35,55,45,65]}];

  const ds=camX*.05; for(let s=Math.floor((ds-10)/47);s<=Math.ceil((ds+W+10)/47);s++){const gx=s*47+23-ds,gy=20+(((s%5)+5)%5)*24;ctx.fillStyle=`rgba(150,100,255,${.2+(((s%3)+3)%3)*.1})`;ctx.beginPath();ctx.arc(gx,gy,3,0,Math.PI*2);ctx.fill();}
}
function drawCloudsBG(camX){
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#4ab8e8'); g.addColorStop(1,'#c8eeff');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

function drawMirrorBG(){

  ctx.fillStyle=fg; ctx.fillRect(0,H-80,W,80);

function drawBoss(b,camX){
  if(!b||b.dead)return;
  const x=px(b.x-camX),y=px(b.y),flip=b.facing===1;
  if(b.hitFlash>0&&Math.floor(b.hitFlash/3)%2===0)ctx.globalAlpha=.5;
  ctx.save(); if(flip){ctx.translate(x+20,y);ctx.scale(-1,1);}else ctx.translate(x,y);
  ctx.fillStyle='rgba(140,0,255,0.2)'; ctx.fillRect(2,28,16,4);
  const t=Date.now()*.004,pulse=Math.sin(t)*.15+.85;
  ctx.fillStyle='#1a0033'; ctx.fillRect(2,0,16,4); ctx.fillRect(0,4,20,4);
  ctx.fillStyle=`rgba(180,60,255,${.4*pulse})`; ctx.fillRect(2,0,16,2);
  ctx.fillStyle='#2a0044'; ctx.fillRect(2,8,16,10);
  ctx.fillStyle=`rgba(220,100,255,${.9*pulse})`; ctx.fillRect(12,10,3,3);
  ctx.fillStyle='rgba(255,180,255,0.6)'; ctx.fillRect(13,11,1,1);
  ctx.fillStyle='#1a0033'; ctx.fillRect(4,14,12,3); ctx.fillRect(6,17,10,2);
  ctx.fillStyle='#0d001a'; ctx.fillRect(0,18,20,8);
  ctx.fillStyle=`rgba(140,40,255,${.3*pulse})`; ctx.fillRect(0,18,20,8);
  ctx.fillStyle='#0a0014'; ctx.fillRect(2,22,8,4); ctx.fillRect(10,22,8,4);
  ctx.fillStyle='#08000f'; const fo=b.onGround?((b.runFrame||0)%2===0?0:2):0;
  ctx.fillRect(0,26+fo,10,6); ctx.fillRect(10,26+(2-fo),10,6);
  if(b.stunTimer>0){ctx.restore();ctx.save();ctx.translate(x+10,y-10);for(let i=0;i<3;i++){const a=Date.now()*.005+i*2.1;ctx.fillStyle=`hsl(${60+i*40},100%,70%)`;ctx.beginPath();ctx.arc(Math.cos(a)*12,Math.sin(a)*6-4,4,0,Math.PI*2);ctx.fill();}}
  ctx.restore(); ctx.globalAlpha=1;
  if(b.phase>=1){const ac=b.phase===3?'rgba(255,40,40,':'rgba(160,40,255,';ctx.strokeStyle=ac+(0.3+Math.sin(t*3)*.15)+')';ctx.lineWidth=2;ctx.strokeRect(px(b.x-camX)-4,px(b.y)-4,b.w+8,b.h+8);}
}
function drawGolem(b,camX){
  if(!b||b.dead)return;
  const x=px(b.x-camX),y=px(b.y),t=Date.now()*.001;
  if(b.hitFlash>0&&Math.floor(b.hitFlash/3)%2===0)ctx.globalAlpha=.5;
  ctx.save(); ctx.translate(x,y);
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(-2,36,32,6);
  // feet
  ctx.fillStyle='#5a4a3a'; ctx.fillRect(-2,32,14,10); ctx.fillRect(16,32,14,10);
  ctx.fillStyle='#3a2a1a'; ctx.fillRect(0,34,10,6); ctx.fillRect(18,34,10,6);
  // legs
  ctx.fillStyle='#6a5a4a'; ctx.fillRect(2,22,10,12); ctx.fillRect(16,22,10,12);
  // body — large and blocky
  ctx.fillStyle='#7a6a5a'; ctx.fillRect(-4,4,36,22);
  ctx.fillStyle='#8a7a6a'; ctx.fillRect(-2,6,34,4); // highlight
  ctx.fillStyle='#5a4a3a'; ctx.fillRect(-2,20,34,4); // shadow base
  // crack lines show phase damage
  if(b.hp<b.maxHp){
    ctx.fillStyle='#3a2a1a';
    ctx.fillRect(8,8,2,14); // crack 1
    if(b.hp<=3){ctx.fillRect(18,10,2,10);ctx.fillRect(20,14,4,2);}
    if(b.hp<=1){ctx.fillRect(4,6,2,18);ctx.fillRect(24,8,2,16);}
  }
  // arms
  const armSway=b.onGround?Math.sin(t*3)*3:0;
  ctx.fillStyle='#7a6a5a';
  ctx.fillRect(-14,6+armSway,14,10); ctx.fillRect(28,6-armSway,14,10);
  ctx.fillStyle='#5a4a3a';
  ctx.fillRect(-16,8+armSway,6,6); ctx.fillRect(38,8-armSway,6,6);
  // head
  ctx.fillStyle='#8a7a6a'; ctx.fillRect(2,0,24,8);
  ctx.fillStyle='#3a2a1a'; ctx.fillRect(4,0,20,2); // brow
  ctx.fillStyle='rgba(255,100,0,0.9)'; ctx.fillRect(6,2,6,4); ctx.fillRect(16,2,6,4); // glowing eyes
  ctx.fillStyle='#ffcc88'; ctx.fillRect(8,3,2,2); ctx.fillRect(18,3,2,2); // eye cores
  // stun stars
  if(b.stunTimer>0){
    ctx.restore(); ctx.save(); ctx.translate(x+14,y-10);
    for(let i=0;i<4;i++){const a=Date.now()*.004+i*1.57;ctx.fillStyle=`hsl(${30+i*30},100%,70%)`;ctx.beginPath();ctx.arc(Math.cos(a)*14,Math.sin(a)*7-4,4,0,Math.PI*2);ctx.fill();}
  }
  ctx.restore(); ctx.globalAlpha=1;
  // health aura border
  if(b.phase>=1){
    const hfrac=b.hp/b.maxHp;
    const ac=hfrac>.4?`rgba(180,120,40,`:`rgba(255,60,20,`;
    ctx.strokeStyle=ac+(0.3+Math.sin(t*4)*.15)+')'; ctx.lineWidth=3;
    ctx.strokeRect(px(b.x-camX)-6,px(b.y)-2,b.w+12,b.h+8);
  }
  // draw boulders
  for(const bl of b.boulders){
    const bx2=px(bl.x-camX),by2=px(bl.y);
    ctx.fillStyle='#7a6a5a'; ctx.beginPath(); ctx.arc(bx2+8,by2+8,10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#5a4a3a'; ctx.beginPath(); ctx.arc(bx2+6,by2+6,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#8a7a6a'; ctx.beginPath(); ctx.arc(bx2+10,by2+4,2,0,Math.PI*2); ctx.fill();
  }
}

function drawPhantom(b,camX){
  if(!b||b.dead)return;
  if(!b.visible&&Math.floor(Date.now()/80)%2===0)return; // flicker when invisible
  const x=px(b.x-camX),y=px(b.y),t=Date.now()*.003;
  const alpha=b.visible?1:0.25;
  ctx.globalAlpha=alpha*(b.hitFlash>0&&Math.floor(b.hitFlash/3)%2===0?0.4:1);
  // draw afterimages first
  for(let i=0;i<b.afterImages.length;i++){
    const ai=b.afterImages[i];
    const aAlpha=(ai.life/ai.maxLife)*0.35;
    ctx.globalAlpha=aAlpha;
    ctx.fillStyle='#00ffcc';
    ctx.fillRect(px(ai.x-camX),px(ai.y),20,32);
  }
  ctx.globalAlpha=alpha;
  ctx.save(); ctx.translate(x,y);
  // flowing robe/cloak shape
  const wave=Math.sin(t*2)*3;
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(0,28,20,6);
  // cloak bottom — wavy
  ctx.fillStyle='#003344';
  ctx.beginPath();
  ctx.moveTo(-4,10); ctx.lineTo(-4+wave,32); ctx.lineTo(24-wave,32); ctx.lineTo(24,10);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#004455';
  ctx.beginPath();
  ctx.moveTo(0,14); ctx.lineTo(-2+wave,32); ctx.lineTo(22-wave,32); ctx.lineTo(22,14);
  ctx.closePath(); ctx.fill();
  // body glow
  const glowA=0.15+Math.sin(t*3)*.1;
  ctx.fillStyle=`rgba(0,255,200,${glowA})`; ctx.fillRect(-2,6,24,22);
  // inner body
  ctx.fillStyle='#001a22'; ctx.fillRect(2,8,16,18);
  // head/hood
  ctx.fillStyle='#003344'; ctx.fillRect(0,0,20,10);
  ctx.fillStyle='#002233'; ctx.fillRect(2,2,16,8);
  // eyes — glowing teal
  ctx.fillStyle=`rgba(0,255,180,${0.8+Math.sin(t*5)*.2})`;
  ctx.fillRect(3,3,5,3); ctx.fillRect(12,3,5,3);
  ctx.fillStyle='#ffffff'; ctx.fillRect(5,4,1,1); ctx.fillRect(14,4,1,1);
  // phase particle trails
  if(b.phase>=2){
    for(let i=0;i<3;i++){
      const pa=t*4+i*2.1;
      ctx.fillStyle=`rgba(0,255,200,${0.4-i*.1})`;
      ctx.beginPath(); ctx.arc(10+Math.cos(pa)*14,16+Math.sin(pa)*10,3-i,0,Math.PI*2); ctx.fill();
    }
  }
  // stun
  if(b.stunTimer>0){
    ctx.restore(); ctx.save(); ctx.translate(x+10,y-10);
    for(let i=0;i<3;i++){const a=Date.now()*.005+i*2.1;ctx.fillStyle=`hsl(${180+i*40},100%,70%)`;ctx.beginPath();ctx.arc(Math.cos(a)*12,Math.sin(a)*6-4,4,0,Math.PI*2);ctx.fill();}
  }
  ctx.restore(); ctx.globalAlpha=1;
  if(b.phase>=1){
    const ac=b.phase===3?'rgba(0,255,160,':'rgba(0,200,220,';
    ctx.strokeStyle=ac+(0.3+Math.sin(t*3)*.15)+')'; ctx.lineWidth=2;
    ctx.strokeRect(px(b.x-camX)-4,px(b.y)-4,b.w+8,b.h+8);
  }
}

function drawBossHUD(b){
  if(!b||b.dead||b.phase===0)return;
  const bW=300,bH=14,bX=(W-300)/2,bY=12;
  ctx.fillStyle='#000'; ctx.fillRect(bX-2,bY-2,bW+4,bH+4);
  ctx.fillStyle='#2a0044'; ctx.fillRect(bX,bY,bW,bH);
  const hp=b.hp/b.maxHp;
  let barCol;
  if(b.type==='golem')   barCol=hp>.6?'#c0803a':hp>.3?'#e05010':'#ff2020';
  else if(b.type==='phantom') barCol=hp>.6?'#00ddaa':hp>.3?'#0099ff':'#ff2020';
  else                   barCol=hp>.6?'#aa44ff':hp>.3?'#ff6600':'#ff2020';
  ctx.fillStyle=barCol; ctx.fillRect(bX,bY,Math.floor(bW*hp),bH);
  ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(bX,bY,Math.floor(bW*hp),4);
  ctx.strokeStyle='#880088'; ctx.lineWidth=2; ctx.strokeRect(bX-2,bY-2,bW+4,bH+4);
  ctx.font='7px "Press Start 2P"'; ctx.fillStyle='#cc88ff'; ctx.textAlign='center';
  const bossName=b.type==='golem'?'STONE GOLEM':b.type==='phantom'?'THE PHANTOM':'MIRROR MAGE';
  ctx.fillText(bossName,W/2,bY+bH+14); ctx.textAlign='left';
}

const particles=[];
function spawnParticles(x,y,type){
  if(type==='coin') for(let i=0;i<8;i++)  particles.push({x,y,vx:(Math.random()-.5)*4,vy:-Math.random()*5-2,life:40,maxLife:40,color:PAL.coinY,r:4,type:'circle'});
  if(type==='stomp')for(let i=0;i<10;i++) particles.push({x,y,vx:(Math.random()-.5)*5,vy:-Math.random()*3,  life:30,maxLife:30,color:PAL.gBrown,r:5,type:'rect'});
  if(type==='dust') for(let i=0;i<5;i++)  particles.push({x,y,vx:(Math.random()-.5)*3,vy:-Math.random()*2,  life:20,maxLife:20,color:PAL.dustCol,r:6,type:'circle'});
  if(type==='death')for(let i=0;i<16;i++){const a=(i/16)*Math.PI*2;particles.push({x,y,vx:Math.cos(a)*5,vy:Math.sin(a)*5-3,life:50,maxLife:50,color:PAL.pHat,r:6,type:'rect'});}
}
function updateParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life--;if(p.life<=0)particles.splice(i,1);}}
function drawParticles(camX){for(const p of particles){ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;if(p.type==='circle'){ctx.beginPath();ctx.arc(px(p.x-camX),px(p.y),p.r*(p.life/p.maxLife)+1,0,Math.PI*2);ctx.fill();}else ctx.fillRect(px(p.x-camX-p.r/2),px(p.y-p.r/2),p.r,p.r);}ctx.globalAlpha=1;}
const floatTexts=[];
function spawnFloatText(x,y,text,color='#f0bc3c'){floatTexts.push({x,y,text,color,life:60,maxLife:60});}
function updateFloatTexts(){for(let i=floatTexts.length-1;i>=0;i--){floatTexts[i].y-=1.2;floatTexts[i].life--;if(floatTexts[i].life<=0)floatTexts.splice(i,1);}}
function drawFloatTexts(camX){ctx.font='8px "Press Start 2P"';for(const t of floatTexts){ctx.globalAlpha=t.life/t.maxLife;ctx.fillStyle=t.color;ctx.fillText(t.text,px(t.x-camX),px(t.y));}ctx.globalAlpha=1;}

const game={state:'loading',currentLevel:0,score:0,coins:0,lives:3,level:null,player:null,boss:null,camX:0,timer:300,timerTick:0,activeSlot:null};

function spawnBossIntro(name, sub, hint){
  setTimeout(()=>{
    if(game.state!=='playing')return;
    const b=document.createElement('div');
    b.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);border:2px solid #aa44ff;padding:18px 32px;text-align:center;z-index:20;pointer-events:none;';
    b.innerHTML=`<div style="font-family:'Press Start 2P',monospace;color:#cc88ff;font-size:11px;margin-bottom:6px">BOSS</div><div style="font-family:'Press Start 2P',monospace;color:#ff88ff;font-size:13px;margin-bottom:8px">${name}</div><div style="font-family:'Press Start 2P',monospace;color:#aaa;font-size:7px;margin-bottom:4px">${sub}</div><div style="font-family:'Press Start 2P',monospace;color:#888;font-size:7px">${hint}</div>`;
    document.getElementById('canvas-wrap').appendChild(b);
    setTimeout(()=>b.remove(),2800);
  },400);
}

function initLevel(idx){
  const lvl=parseMarkdownLevel(LEVEL_MARKDOWN[idx]);
  game.level=lvl; game.camX=0;
  game.timer=parseInt(lvl.meta.time||'300'); game.timerTick=0;
  particles.length=0; floatTexts.length=0;
  const sp=lvl.playerStart;
  game.player={x:sp.x,y:sp.y,vx:0,vy:0,w:20,h:32,onGround:false,facing:1,runFrame:0,runTick:0,dead:false,invincible:0};
  game.level.enemies=lvl.enemies.map(e=>({...e}));
  game.level.coins=lvl.coins.map(c=>({...c}));
  game.boss=null;
  if(lvl.meta.boss==='golem'){
    const bx=lvl.meta._bossSpawnX||lvl.width/2,by=lvl.meta._bossSpawnY||(lvl.height-TILE*3);
    game.boss={x:bx,y:by,vx:0,vy:0,w:28,h:40,hp:5,maxHp:5,phase:0,onGround:false,facing:-1,type:'golem',
      stunTimer:0,hitFlash:0,introTimer:120,jumpCooldown:0,runFrame:0,runTick:0,dead:false,
      throwTimer:0,boulders:[],walkDir:1,walkTimer:0};
    spawnBossIntro('GOLEM','A stone colossus awakens','Stomp 5 times to shatter it');
  }
  if(lvl.meta.boss==='phantom'){
    const bx=lvl.meta._bossSpawnX||lvl.width/2,by=lvl.meta._bossSpawnY||(lvl.height-TILE*3);
    game.boss={x:bx,y:by,vx:0,vy:0,w:20,h:32,hp:3,maxHp:3,phase:0,onGround:false,facing:-1,type:'phantom',
      stunTimer:0,hitFlash:0,introTimer:120,jumpCooldown:0,dead:false,
      teleportTimer:0,afterImages:[],visible:true,visTimer:0,targetX:0,targetY:0};
    spawnBossIntro('PHANTOM','An apparition from the void','Stomp the true form');
  }
  if(lvl.meta.boss==='mirror'){
    const bx=lvl.meta._bossSpawnX||lvl.width/2,by=lvl.meta._bossSpawnY||(lvl.height-TILE*3);
    game.boss={x:bx,y:by,vx:0,vy:0,w:20,h:32,hp:3,maxHp:3,phase:0,onGround:false,facing:-1,inputBuffer:[],stunTimer:0,hitFlash:0,introTimer:180,jumpCooldown:0,runFrame:0,runTick:0,dead:false};
    spawnBossIntro('MIRROR MAGE','A dark reflection awakens','Stomp the clone to win');
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById('score-val').textContent=String(game.score).padStart(6,'0');
  document.getElementById('coins-val').textContent='x'+String(game.coins).padStart(2,'0');
  document.getElementById('world-val').textContent=`${game.currentLevel+1}-1`;
  const tv=document.getElementById('timer-val'); tv.textContent=game.timer; tv.className=game.timer<60?'hud-val urgent':'hud-val';
  document.getElementById('lives-display').textContent='v'.repeat(Math.max(0,game.lives))||'o';
}

// COLLISION
// ============================================================
function getTile(r,c){if(!game.level)return null;const t=game.level.tiles;if(r<0||r>=t.length)return null;if(!t[r]||c<0||c>=t[r].length)return null;return t[r][c];}
function isSolid(r,c){const t=getTile(r,c);return t==='ground'||t==='brick';}
function resolvePlayerCollision(p){
  p.onGround=false;
  {const l=Math.floor(p.x/TILE),r=Math.floor((p.x+p.w-1)/TILE);
   if(p.vy>=0){const br=Math.floor((p.y+p.h)/TILE);let hit=false;for(let c=l;c<=r;c++)if(isSolid(br,c)){hit=true;break;}if(hit){p.y=br*TILE-p.h;p.vy=0;p.onGround=true;}}
   else{const tr=Math.floor(p.y/TILE);let hit=false;for(let c=l;c<=r;c++)if(isSolid(tr,c)){hit=true;break;}if(hit){p.y=(tr+1)*TILE;p.vy=0;}}
  }
  {const t=Math.floor(p.y/TILE),b=Math.floor((p.y+p.h-1)/TILE);
   if(p.vx>0){const rc=Math.floor((p.x+p.w)/TILE);let hit=false;for(let r=t;r<=b;r++)if(isSolid(r,rc)){hit=true;break;}if(hit){p.x=rc*TILE-p.w;p.vx=0;}}
   else if(p.vx<0){const lc=Math.floor(p.x/TILE);let hit=false;for(let r=t;r<=b;r++)if(isSolid(r,lc)){hit=true;break;}if(hit){p.x=(lc+1)*TILE;p.vx=0;}}
  }
}
function resolveEntityCollision(e){
  const eW=e.w,eH=e.h; e.onGround=false;
  {const l=Math.floor(e.x/TILE),r=Math.floor((e.x+eW-1)/TILE);
   if(e.vy>=0){const br=Math.floor((e.y+eH)/TILE);let hit=false;for(let c=l;c<=r;c++)if(isSolid(br,c)){hit=true;break;}if(hit){e.y=br*TILE-eH;e.vy=0;e.onGround=true;}}
   else{const tr=Math.floor(e.y/TILE);let hit=false;for(let c=l;c<=r;c++)if(isSolid(tr,c)){hit=true;break;}if(hit){e.y=(tr+1)*TILE;e.vy=0;}}
  }
  {const t=Math.floor(e.y/TILE),b=Math.floor((e.y+eH-1)/TILE);
   if(e.vx>0){const rc=Math.floor((e.x+eW)/TILE);let hit=false;for(let r=t;r<=b;r++)if(isSolid(r,rc)){hit=true;break;}if(hit){e.x=rc*TILE-eW;e.vx=0;}}
   else if(e.vx<0){const lc=Math.floor(e.x/TILE);let hit=false;for(let r=t;r<=b;r++)if(isSolid(r,lc)){hit=true;break;}if(hit){e.x=(lc+1)*TILE;e.vx=0;}}
  }
}

function updateTurtle(e,p){
  const eW=28,eH=30;
  if(e.inShell){
    if(e.shellTimer>0){e.shellTimer--;return;}
    // sliding shell
    e.x+=e.shellVx; e.vy+=GRAVITY; if(e.vy>15)e.vy=15; e.y+=e.vy;
    const el2=Math.floor(e.x/TILE),er2=Math.floor((e.x+eW-1)/TILE),et2=Math.floor(e.y/TILE),eb2=Math.floor((e.y+eH-1)/TILE);
    e.onGround=false;
    if(e.vy>=0){const fr=Math.floor((e.y+eH)/TILE);let hit=false;for(let c=el2;c<=er2;c++)if(isSolid(fr,c)){hit=true;break;}if(hit){e.y=fr*TILE-eH;e.vy=0;e.onGround=true;}}
    if(e.shellVx>0){const rc=Math.floor((e.x+eW)/TILE);for(let r=et2;r<=eb2;r++)if(isSolid(r,rc)){e.shellVx=-Math.abs(e.shellVx);SFX.bump();break;}}
    else if(e.shellVx<0){const lc=Math.floor(e.x/TILE);for(let r=et2;r<=eb2;r++)if(isSolid(r,lc)){e.shellVx=Math.abs(e.shellVx);SFX.bump();break;}}
    // shell kills other enemies
    for(const oe of game.level.enemies){
      if(oe===e||!oe.alive)continue;
      if(rectsOverlap(e.x,e.y,eW,eH,oe.x,oe.y,28,28)){oe.alive=false;oe.squishTimer=30;game.score+=200;spawnParticles(oe.x+14,oe.y,'stomp');spawnFloatText(oe.x,oe.y-10,'+200');SFX.stomp();updateHUD();}
    }
    // player stomps sliding shell stops it; touch from side kills player
    if(p.invincible<=0&&rectsOverlap(p.x,p.y,p.w,p.h,e.x,e.y,eW,eH)){
      if(p.vy>0&&p.y+p.h<e.y+14){
        if(Math.abs(e.shellVx)>0){e.shellVx=0;p.vy=-8;game.score+=50;spawnFloatText(e.x,e.y-10,'+50');SFX.stomp();}
        else{e.shellVx=(p.x<e.x?6:-6);p.vy=-8;SFX.bump();}
        updateHUD();
      }else{playerDie();}
    }
    return;
  }
  // walking turtle
  e.x+=e.vx; e.vy+=GRAVITY; if(e.vy>15)e.vy=15; e.y+=e.vy;
  const el=Math.floor(e.x/TILE),er=Math.floor((e.x+eW-1)/TILE),et=Math.floor(e.y/TILE),eb=Math.floor((e.y+eH-1)/TILE);
  e.onGround=false;
  if(e.vy>=0){const fr=Math.floor((e.y+eH)/TILE);let hit=false;for(let c=el;c<=er;c++)if(isSolid(fr,c)){hit=true;break;}if(hit){e.y=fr*TILE-eH;e.vy=0;e.onGround=true;}}
  if(e.vx>0){const rc=Math.floor((e.x+eW)/TILE);for(let r=et;r<=eb;r++)if(isSolid(r,rc)){e.vx=-Math.abs(e.vx);e.dir=-1;break;}}
  else if(e.vx<0){const lc=Math.floor(e.x/TILE);for(let r=et;r<=eb;r++)if(isSolid(r,lc)){e.vx=Math.abs(e.vx);e.dir=1;break;}}
  if(e.onGround){const fr2=Math.floor((e.y+eH)/TILE),ac=e.vx>0?Math.floor((e.x+eW)/TILE):Math.floor((e.x-1)/TILE);if(!isSolid(fr2,ac)){e.vx=-e.vx;e.dir*=-1;}}
  // turtle jumps over player occasionally
  if(e.onGround&&Math.abs(e.x-p.x)<80&&Math.random()<.004){e.vy=-10;}
  if(p.invincible<=0&&rectsOverlap(p.x,p.y,p.w,p.h,e.x,e.y,eW,eH)){
    if(p.vy>0&&p.y+p.h<e.y+14){
      // first stomp: enter shell
      e.inShell=true; e.shellVx=0; e.shellTimer=90; e.vx=0;
      p.vy=-8; game.score+=200; spawnParticles(e.x+14,e.y,'stomp'); spawnFloatText(e.x,e.y-10,'+200'); SFX.stomp(); updateHUD();
    }else{playerDie();}
  }
}

function updateGolem(b,p){
  if(!b||b.dead)return;
  const lvl=game.level;
  if(b.phase===0){b.introTimer--;if(b.introTimer<=0){b.phase=1;SFX.cloneAppear();}return;}
  if(b.stunTimer>0){
    b.stunTimer--;b.vx*=.80;b.vy+=GRAVITY;if(b.vy>15)b.vy=15;b.x+=b.vx;b.y+=b.vy;
    if(b.x<TILE){b.x=TILE;b.vx=0;}if(b.x+b.w>lvl.width-TILE){b.x=lvl.width-TILE-b.w;b.vx=0;}
    resolveEntityCollision(b);if(b.hitFlash>0)b.hitFlash--;return;
  }
  if(b.hitFlash>0)b.hitFlash--;
  // movement: slow walk toward player
  const speed=[0,.6,.9,1.2,1.5][Math.min(b.phase,4)];
  const dx=p.x-b.x;
  if(Math.abs(dx)>40){b.vx+=(dx>0?1:-1)*0.12;if(b.vx>speed)b.vx=speed;if(b.vx<-speed)b.vx=-speed;}
  else{b.vx*=.85;}
  b.vy+=GRAVITY;if(b.vy>15)b.vy=15;
  b.x+=b.vx;b.y+=b.vy;
  if(b.x<TILE){b.x=TILE;b.vx=0;}if(b.x+b.w>lvl.width-TILE){b.x=lvl.width-TILE-b.w;b.vx=0;}
  resolveEntityCollision(b);
  if(b.vx<-.1)b.facing=-1;else if(b.vx>.1)b.facing=1;
  // occasional ground slam jump
  if(b.onGround&&b.jumpCooldown<=0&&Math.abs(dx)<200&&Math.random()<.008){
    b.vy=JUMP_FORCE*.9;b.jumpCooldown=120;SFX.bump();
  }
  if(b.jumpCooldown>0)b.jumpCooldown--;
  // throw boulders
  b.throwTimer--;
  const throwInterval=[0,240,180,120,80][Math.min(b.phase,4)];
  if(b.phase>=1&&b.throwTimer<=0){
    b.throwTimer=throwInterval;
    const angle=Math.atan2(p.y-b.y,p.x-b.x);
    const spd=3+b.phase*.5;
    b.boulders.push({x:b.x+b.w/2,y:b.y+8,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-3,r:10,life:180});
    SFX.bump();
  }
  // update boulders
  for(let i=b.boulders.length-1;i>=0;i--){
    const bl=b.boulders[i];
    bl.x+=bl.vx;bl.y+=bl.vy;bl.vy+=.3;bl.life--;
    if(bl.life<=0||bl.y>lvl.height+50){b.boulders.splice(i,1);continue;}
    // boulder hits player
    if(p.invincible<=0&&rectsOverlap(p.x,p.y,p.w,p.h,bl.x-bl.r,bl.y-bl.r,bl.r*2,bl.r*2)){
      b.boulders.splice(i,1);playerDie();return;
    }
  }
  // player stomps golem
  if(p.invincible<=0&&rectsOverlap(p.x,p.y,p.w,p.h,b.x,b.y,b.w,b.h)){
    if(p.vy>0&&p.y+p.h<b.y+16){
      b.hp--;b.stunTimer=100;b.hitFlash=30;p.vy=-11;SFX.bossHit();spawnParticles(b.x+14,b.y,'stomp');
      spawnFloatText(b.x,b.y-16,b.hp>0?'CRACK!':'SHATTERED!','#ffaa44');game.score+=500;updateHUD();
      if(b.hp<=0){b.dead=true;SFX.bossDefeat();spawnParticles(b.x+14,b.y+20,'death');spawnParticles(b.x+14,b.y+20,'coin');spawnFloatText(b.x-10,b.y-30,'+5000','#ffaa44');game.score+=5000;updateHUD();setTimeout(()=>levelComplete(),2000);return;}
      b.phase=Math.ceil((b.maxHp-b.hp)/1);if(b.phase>=2)SFX.bossPhase();
    }else{if(p.invincible<=0){playerDie();return;}}
  }
}

function updatePhantom(b,p){
  if(!b||b.dead)return;
  const lvl=game.level;
  if(b.phase===0){b.introTimer--;if(b.introTimer<=0){b.phase=1;b.visible=true;b.targetX=p.x;b.targetY=p.y-64;SFX.cloneAppear();}return;}
  if(b.stunTimer>0){
    b.stunTimer--;b.vx*=.85;b.vy+=GRAVITY;if(b.vy>15)b.vy=15;b.x+=b.vx;b.y+=b.vy;
    if(b.x<TILE){b.x=TILE;b.vx=0;}if(b.x+b.w>lvl.width-TILE){b.x=lvl.width-TILE-b.w;b.vx=0;}
    resolveEntityCollision(b);if(b.hitFlash>0)b.hitFlash--;return;
  }
  if(b.hitFlash>0)b.hitFlash--;
  // manage visibility timer
  if(!b.visible){b.visTimer--;if(b.visTimer<=0){b.visible=true;SFX.cloneAppear();// teleport to near player
    const side=Math.random()<.5?-1:1;b.x=p.x+side*120;b.y=p.y-80;b.vx=0;b.vy=0;}}
  // add afterimages
  if(b.visible&&Math.abs(b.vx)>.5){b.afterImages.push({x:b.x,y:b.y,life:18,maxLife:18});}
  for(let i=b.afterImages.length-1;i>=0;i--){b.afterImages[i].life--;if(b.afterImages[i].life<=0)b.afterImages.splice(i,1);}
  if(!b.visible)return;
  // movement: float toward player, phase affects speed
  const spd=[0,.8,1.3,1.9][Math.min(b.phase,3)];
  const dx=p.x-b.x,dy=(p.y-b.h/2)-b.y;
  b.vx+=(dx>0?1:-1)*.1*spd;b.vy+=(dy>0?1:-1)*.08*spd;
  const maxV=spd*2;if(b.vx>maxV)b.vx=maxV;if(b.vx<-maxV)b.vx=-maxV;if(b.vy>maxV)b.vy=maxV;if(b.vy<-maxV)b.vy=-maxV;
  b.vy+=GRAVITY*.3; // floats, partial gravity
  b.x+=b.vx;b.y+=b.vy;
  if(b.x<TILE){b.x=TILE;b.vx=0;}if(b.x+b.w>lvl.width-TILE){b.x=lvl.width-TILE-b.w;b.vx=0;}
  resolveEntityCollision(b);
  if(b.vx<-.2)b.facing=-1;else if(b.vx>.2)b.facing=1;
  // teleport timer
  b.teleportTimer--;
  const teleInterval=[0,300,200,130][Math.min(b.phase,3)];
  if(b.teleportTimer<=0){b.teleportTimer=teleInterval;b.visible=false;b.visTimer=[0,80,55,35][Math.min(b.phase,3)];SFX.pause();}
  // player stomps phantom
  if(b.visible&&p.invincible<=0&&rectsOverlap(p.x,p.y,p.w,p.h,b.x,b.y,b.w,b.h)){
    if(p.vy>0&&p.y+p.h<b.y+14){
      b.hp--;b.stunTimer=70;b.hitFlash=25;p.vy=-10;SFX.bossHit();spawnParticles(b.x+10,b.y,'stomp');
      spawnFloatText(b.x,b.y-16,b.hp>0?'HIT!':'BANISHED!','#00ffcc');game.score+=500;updateHUD();
      if(b.hp<=0){b.dead=true;SFX.bossDefeat();spawnParticles(b.x+10,b.y+16,'death');spawnParticles(b.x+10,b.y+16,'coin');spawnFloatText(b.x-10,b.y-30,'+5000','#00ffcc');game.score+=5000;updateHUD();setTimeout(()=>levelComplete(),2000);return;}
      b.phase=Math.min(4-b.hp,3);if(b.phase>=2)SFX.bossPhase();
      b.visible=false;b.visTimer=50;b.teleportTimer=teleInterval;
    }else{if(p.invincible<=0){playerDie();return;}}
  }
}

function updateBoss(b,p){
  if(!b||b.dead)return;
  const lvl=game.level;
  if(b.phase===0){b.introTimer--;if(b.introTimer<=0){b.phase=1;SFX.cloneAppear();spawnParticles(b.x+10,b.y+16,'death');}return;}
  if(b.stunTimer>0){b.stunTimer--;b.vx*=.85;b.vy+=GRAVITY;if(b.vy>15)b.vy=15;b.y+=b.vy;b.x+=b.vx;if(b.x<TILE){b.x=TILE;b.vx=0;}if(b.x+b.w>lvl.width-TILE){b.x=lvl.width-TILE-b.w;b.vx=0;}resolveEntityCollision(b);if(b.hitFlash>0)b.hitFlash--;return;}
  const spd=[0,1,1.5,2.2][Math.min(b.phase,3)],jmp=[0,1,1.2,1.5][Math.min(b.phase,3)],del=[0,130,90,55][Math.min(b.phase,3)];
  b.inputBuffer.push({vx:p.vx,jumping:!p.onGround&&p.vy<0});
  while(b.inputBuffer.length>del+2)b.inputBuffer.shift();
  const d=b.inputBuffer[0]||{vx:0,jumping:false};
  b.vx=-d.vx*spd;
  if(d.jumping&&b.onGround&&b.jumpCooldown<=0){b.vy=JUMP_FORCE*jmp;b.onGround=false;b.jumpCooldown=20;}
  if(b.jumpCooldown>0)b.jumpCooldown--;
  if(b.phase===3&&b.onGround&&b.jumpCooldown<=0&&Math.random()<.015){b.vy=JUMP_FORCE*1.3;b.jumpCooldown=30;}
  b.vy+=GRAVITY;if(b.vy>20)b.vy=20;
  b.x+=b.vx;b.y+=b.vy;
  if(b.x<TILE){b.x=TILE;b.vx=0;}if(b.x+b.w>lvl.width-TILE){b.x=lvl.width-TILE-b.w;b.vx=0;}
  resolveEntityCollision(b);
  if(b.vx<-.3)b.facing=-1;else if(b.vx>.3)b.facing=1;
  if(b.onGround&&Math.abs(b.vx)>.5){b.runTick++;if(b.runTick>8){b.runTick=0;b.runFrame++;}}
  if(b.hitFlash>0)b.hitFlash--;
  if(p.invincible<=0&&rectsOverlap(p.x,p.y,p.w,p.h,b.x,b.y,b.w,b.h)){
    if(p.vy>0&&p.y+p.h<b.y+14){
      b.hp--;b.stunTimer=80;b.hitFlash=25;p.vy=-10;SFX.bossHit();spawnParticles(b.x+10,b.y,'stomp');
      spawnFloatText(b.x+4,b.y-16,b.hp>0?'HIT!':'DOWN!','#ff88ff');game.score+=500;updateHUD();
      if(b.hp<=0){b.dead=true;SFX.bossDefeat();spawnParticles(b.x+10,b.y+16,'death');spawnParticles(b.x+10,b.y+16,'coin');spawnFloatText(b.x-10,b.y-30,'+5000','#ff88ff');game.score+=5000;updateHUD();setTimeout(()=>levelComplete(),2000);return;}
      b.phase=Math.min(4-b.hp,3);if(b.phase>=2)SFX.bossPhase();spawnParticles(b.x+10,b.y,'death');
    }else{if(p.invincible<=0){playerDie();return;}}
  }
}

let lastTime=0,accumulator=0;
const FIXED_STEP=1000/60;

function updateGame(){
  if(game.state!=='playing')return;
  const p=game.player,lvl=game.level;
  if(consumeJustPressed('Escape')||consumeJustPressed('KeyP')){SFX.pause();game.state='paused';showScreen('paused');return;}
  if(consumeJustPressed('KeyR')){game.lives=Math.max(game.lives-1,0);if(game.lives<=0){game.state='gameover';showScreen('gameover');return;}initLevel(game.currentLevel);return;}
  if(p.dead)return;
  let mov=false;
  if(keys['ArrowLeft']||keys['KeyA']){p.vx-=1.2;if(p.vx<-MOVE_SPEED)p.vx=-MOVE_SPEED;p.facing=-1;mov=true;}
  if(keys['ArrowRight']||keys['KeyD']){p.vx+=1.2;if(p.vx>MOVE_SPEED)p.vx=MOVE_SPEED;p.facing=1;mov=true;}
  if(!mov)p.vx*=FRICTION;
  if((consumeJustPressed('Space')||consumeJustPressed('ArrowUp')||consumeJustPressed('KeyZ'))&&p.onGround){p.vy=JUMP_FORCE;p.onGround=false;SFX.jump();}
  if(p.vy<0&&!(keys['Space']||keys['ArrowUp']||keys['KeyZ']))p.vy+=.6;
  p.vy+=GRAVITY;if(p.vy>20)p.vy=20;
  const wog=p.onGround; p.x+=p.vx;p.y+=p.vy;
  if(p.x<0){p.x=0;p.vx=0;}
  resolvePlayerCollision(p);
  if(!wog&&p.onGround&&p.vy<=0)SFX.land();
  if(p.onGround&&mov){p.runTick++;if(p.runTick>8){p.runTick=0;p.runFrame++;}}
  if(p.onGround&&Math.abs(p.vy)<.5&&Math.abs(p.vx)>2&&Math.random()<.3)spawnParticles(p.x+10,p.y+p.h,'dust');
  if(p.y>lvl.height+100){playerDie();return;}
  const tc=Math.max(0,Math.min(p.x-W/3,Math.max(0,lvl.width-W)));
  if(Math.abs(tc-game.camX)>200)game.camX=tc; else game.camX+=(tc-game.camX)*.18;
  game.camX=Math.max(0,Math.min(game.camX,Math.max(0,lvl.width-W)));
  for(const e of lvl.enemies){
    if(!e.alive){e.squishTimer--;continue;}
    if(e.type==='turtle'){updateTurtle(e,p);if(p.dead)return;continue;}
    e.x+=e.vx;e.vy+=GRAVITY;if(e.vy>15)e.vy=15;e.y+=e.vy;
    const eW=28,eH=28,el=Math.floor(e.x/TILE),er=Math.floor((e.x+eW-1)/TILE),et=Math.floor(e.y/TILE),eb=Math.floor((e.y+eH-1)/TILE);
    e.onGround=false;
    if(e.vy>=0){const fr=Math.floor((e.y+eH)/TILE);let hit=false;for(let c=el;c<=er;c++)if(isSolid(fr,c)){hit=true;break;}if(hit){e.y=fr*TILE-eH;e.vy=0;e.onGround=true;}}
    if(e.vx>0){const rc=Math.floor((e.x+eW)/TILE);for(let r=et;r<=eb;r++)if(isSolid(r,rc)){e.vx=-Math.abs(e.vx);break;}}
    else if(e.vx<0){const lc=Math.floor(e.x/TILE);for(let r=et;r<=eb;r++)if(isSolid(r,lc)){e.vx=Math.abs(e.vx);break;}}
    if(e.onGround){const fr2=Math.floor((e.y+eH)/TILE),ac=e.vx>0?Math.floor((e.x+eW)/TILE):Math.floor((e.x-1)/TILE);if(!isSolid(fr2,ac))e.vx=-e.vx;}
    const ms=1.4;if(e.vx>ms)e.vx=ms;if(e.vx<-ms)e.vx=-ms;
    if(p.invincible<=0&&rectsOverlap(p.x,p.y,p.w,p.h,e.x,e.y,28,28)){
      if(p.vy>0&&p.y+p.h<e.y+16){e.alive=false;e.squishTimer=30;p.vy=-8;game.score+=100;spawnParticles(e.x+14,e.y,'stomp');spawnFloatText(e.x,e.y-10,'+100');SFX.stomp();updateHUD();}
      else{playerDie();return;}
    }
  }
  if(game.boss){
    if(game.boss.type==='golem')        updateGolem(game.boss,p);
    else if(game.boss.type==='phantom') updatePhantom(game.boss,p);
    else                                updateBoss(game.boss,p);
    if(p.dead)return;
  }
  for(const h of lvl.hazards)if(p.invincible<=0&&rectsOverlap(p.x,p.y+6,p.w,p.h-6,h.x,h.y+TILE-26,TILE,20)){playerDie();return;}
  for(const c of lvl.coins)if(!c.collected&&rectsOverlap(p.x,p.y,p.w,p.h,c.x-8,c.y-8,16,16)){c.collected=true;game.coins++;game.score+=50;spawnParticles(c.x,c.y,'coin');spawnFloatText(c.x,c.y-10,'+50');SFX.coin();updateHUD();}
  if(!game.boss){const gx=lvl.goalX,gy=lvl.goalY;if(rectsOverlap(p.x,p.y,p.w,p.h,gx+10,gy+TILE-160,12,160)){levelComplete();return;}}
  if(p.invincible>0)p.invincible--;
  game.timerTick++;if(game.timerTick>=60){game.timerTick=0;game.timer--;if(game.timer<=0){game.timer=0;playerDie();return;}updateHUD();}
  updateParticles();updateFloatTexts();
}

function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

function playerDie(){
  const p=game.player;if(p.dead)return;p.dead=true;spawnParticles(p.x+10,p.y+16,'death');SFX.die();game.lives--;updateHUD();
  setTimeout(()=>{if(game.lives<=0){game.state='gameover';SFX.gameover();showScreen('gameover');}else{initLevel(game.currentLevel);game.state='playing';}},1200);
}
function levelComplete(){
  game.score+=game.timer*10;
  const ct=game.level.coins.filter(c=>c.collected).length,tt=game.level.coins.length;
  game.state='levelcomplete';SFX.levelup();showScreen('levelcomplete',{time:game.timer,coinsThisLevel:ct,totalCoins:tt});
  if(game.activeSlot!==null)saveGame(game.activeSlot);updateHUD();
}

// ============================================================
// DRAW
// ============================================================
function drawGame(){
  const lvl=game.level,camX=game.camX;
  drawBackground(lvl.meta.background||'sky',camX);
  if((lvl.meta.background||'sky')==='sky'){
    let gY=H;for(let r=0;r<lvl.tiles.length;r++)if(lvl.tiles[r]&&lvl.tiles[r].some(t=>t==='ground')){gY=r*TILE;break;}
    drawSkyHills(camX,gY);
  }
  const sc=Math.max(0,Math.floor(camX/TILE)-2),ec=Math.min(Math.max(...lvl.tiles.map(r=>r.length)),Math.ceil((camX+W)/TILE)+2);
  for(let row=0;row<lvl.tiles.length;row++)for(let col=sc;col<ec;col++){const t=getTile(row,col),tx=col*TILE-camX,ty=row*TILE;if(t==='ground')drawGroundTile(tx,ty);else if(t==='brick')drawBrickTile(tx,ty);}
  const CL=TILE*4;
  for(const h of lvl.hazards){const sx=h.x-camX;if(sx>-CL&&sx<W+CL)drawHazard(h,camX);}
  for(const c of lvl.coins){const sx=c.x-camX;if(sx>-CL&&sx<W+CL)drawCoin(c,camX);}
  if(!game.boss)drawGoal(lvl.goalX,lvl.goalY,camX);
  for(const e of lvl.enemies){const sx=e.x-camX;if(sx>-CL&&sx<W+CL){if(e.type==='turtle')drawTurtle(e,camX);else drawGoomba(e,camX);}}
  if(game.boss){
    if(game.boss.type==='golem')        drawGolem(game.boss,camX);
    else if(game.boss.type==='phantom') drawPhantom(game.boss,camX);
    else                                drawBoss(game.boss,camX);
  }
  const p=game.player;if(!p.dead&&(p.invincible<=0||Math.floor(p.invincible/4)%2===0))drawPlayer(p,camX);
  drawParticles(camX);drawFloatTexts(camX);
  if(game.boss)drawBossHUD(game.boss);
}

// ============================================================
// SCREENS
// ============================================================
const screenEl=document.getElementById('screen');
// ============================================================
// CUSTOM LEVELS (from map editor localStorage)
// ============================================================
const CUSTOM_STORAGE_KEY = 'pq_custom_levels';

function getCustomLevels() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_STORAGE_KEY)) || []; } catch { return []; }
}

function loadCustomLevels() {
  const customs = getCustomLevels();
  customs.forEach(c => { if(c && c.md) LEVEL_MARKDOWN.push(c.md); });
}

window.openEditor = function() { window.location.href = 'editor/'; };

window.showCustomMenu = function() { showScreen('custommenu'); };

window.playCustom = function(idx) {
  // idx is index within custom levels; offset by built-in count
  const builtIn = LEVEL_CONFIG.length;
  game.score=0; game.coins=0; game.lives=3;
  game.currentLevel = builtIn + idx;
  game.activeSlot=null;
  initLevel(game.currentLevel);
  game.state='playing';
  hideScreen();
};

function showScreen(type,data={}){
  screenEl.classList.remove('hidden');
  let html='';
  if(type==='title'){
    const customCount=getCustomLevels().length;
    const customBtn=customCount?`<button class="screen-btn secondary" onclick="showCustomMenu()">CUSTOM LEVELS (${customCount})</button>`:'';
    html=`<div class="screen-title">PIXEL QUEST</div><div class="screen-subtitle">A retro platformer adventure<br>${LEVEL_CONFIG.length} built-in worlds &middot; coins &middot; enemies &middot; boss fight</div><button class="screen-btn" onclick="startNewGame()">NEW GAME</button>${customBtn}<button class="screen-btn secondary" onclick="showLoadMenu()">LOAD GAME</button><button class="screen-btn secondary" onclick="openEditor()" style="margin-top:4px;border-color:#aa44ff;color:#aa44ff">MAP EDITOR</button>`;
  }else if(type==='paused'){
    html=`<div class="screen-title" style="font-size:20px">PAUSED</div><button class="screen-btn" onclick="resumeGame()">RESUME</button><button class="screen-btn secondary" onclick="showSaveMenu()">SAVE GAME</button><button class="screen-btn secondary" onclick="goToTitle()">TITLE SCREEN</button>`;
  }else if(type==='levelcomplete'){
    const{time,coinsThisLevel,totalCoins}=data;
    html=`<div class="screen-title" style="font-size:18px;color:#6aff6a">LEVEL CLEAR!</div><div class="level-complete-stats"><div class="stat-row"><span>Time Remaining</span><span class="val">${time}</span></div><div class="stat-row"><span>Time Bonus</span><span class="val">+${time*10}</span></div><div class="stat-row"><span>Coins</span><span class="val">${coinsThisLevel}/${totalCoins}</span></div><div class="stat-row"><span>Total Score</span><span class="val">${String(game.score).padStart(6,'0')}</span></div></div>${game.currentLevel+1<LEVEL_MARKDOWN.length?`<button class="screen-btn" onclick="nextLevel()">NEXT LEVEL</button>`:`<button class="screen-btn" style="background:#6aff6a;color:#000" onclick="showWin()">FINISH!</button>`}<button class="screen-btn secondary" onclick="goToTitle()">TITLE</button>`;
  }else if(type==='gameover'){
    html=`<div class="screen-title" style="color:#e63232">GAME OVER</div><div class="screen-subtitle">Score: ${String(game.score).padStart(6,'0')}</div><button class="screen-btn" onclick="startNewGame()">TRY AGAIN</button><button class="screen-btn secondary" onclick="goToTitle()">TITLE</button>`;
  }else if(type==='win'){
    html=`<div class="screen-title" style="font-size:18px">YOU WIN!</div><div class="screen-subtitle">Final Score: ${String(game.score).padStart(6,'0')}<br>Total Coins: ${game.coins}<br><br>Thanks for playing PIXEL QUEST!</div><button class="screen-btn" onclick="startNewGame()">PLAY AGAIN</button><button class="screen-btn secondary" onclick="goToTitle()">TITLE</button>`;
  }else if(type==='savemenu'){
    const sv=getSaves(),sl=sv.map((s,i)=>s&&s.savedAt?`<div class="save-slot" onclick="doSave(${i})"><span class="slot-name">SLOT ${i+1}</span><span>W${s.level+1} - ${s.score} pts</span><span style="font-size:7px;color:#888">${s.savedAt}</span></div>`:`<div class="save-slot" onclick="doSave(${i})"><span class="slot-name">SLOT ${i+1}</span><span class="slot-empty">-- Empty --</span></div>`).join('');
    html=`<div class="screen-title" style="font-size:16px">SAVE GAME</div><div class="save-slots">${sl}</div><button class="screen-btn secondary" onclick="resumeGame()">CANCEL</button>`;
  }else if(type==='loadmenu'){
    const sv=getSaves(),sl=sv.map((s,i)=>s&&s.savedAt?`<div class="save-slot" onclick="doLoad(${i})"><span class="slot-name">SLOT ${i+1}</span><span>W${s.level+1} - ${s.score} pts</span><span style="font-size:7px;color:#888">${s.savedAt}</span></div>`:`<div class="save-slot" style="opacity:0.4;cursor:default"><span class="slot-name">SLOT ${i+1}</span><span class="slot-empty">-- Empty --</span></div>`).join('');
    html=`<div class="screen-title" style="font-size:16px">LOAD GAME</div><div class="save-slots">${sl}</div><button class="screen-btn secondary" onclick="goToTitle()">BACK</button>`;
  }else if(type==='loading'){
    html=`<div class="screen-title" style="font-size:16px">LOADING...</div><div class="screen-subtitle" id="load-status">Fetching levels...</div>`;
  }else if(type==='custommenu'){
    const customs=getCustomLevels();
    if(!customs.length){html=`<div class="screen-title" style="font-size:14px">CUSTOM LEVELS</div><div class="screen-subtitle">No custom levels saved yet.<br><br>Open the Map Editor to create one!</div><button class="screen-btn" onclick="openEditor()" style="background:#aa44ff;color:#000">OPEN EDITOR</button><button class="screen-btn secondary" onclick="goToTitle()">BACK</button>`;}
    else{const sl=customs.map((c,i)=>`<div class="save-slot" onclick="playCustom(${i})" style="cursor:pointer"><span class="slot-name">${c.name||'Untitled'}</span><span style="font-size:7px;color:#888">${c.meta?.background||'sky'} &middot; ${c.savedAt||''}</span></div>`).join('');html=`<div class="screen-title" style="font-size:14px">CUSTOM LEVELS</div><div class="save-slots" style="max-height:280px;overflow-y:auto">${sl}</div><button class="screen-btn secondary" onclick="openEditor()" style="border-color:#aa44ff;color:#aa44ff">EDITOR</button><button class="screen-btn secondary" onclick="goToTitle()">BACK</button>`;}
  }else if(type==='loaderror'){
    html=`<div class="screen-title" style="font-size:14px;color:#e63232">LOAD ERROR</div><div class="screen-subtitle" style="max-width:500px">${data.msg||'Could not load level files.'}<br><br>Make sure all .md files are in the the /levels/ folder and you are serving via http:// (not file://).</div>`;
  }
  screenEl.innerHTML=html;
}
function hideScreen(){screenEl.classList.add('hidden');}

window.startNewGame=function(){game.score=0;game.coins=0;game.lives=3;game.currentLevel=0;game.activeSlot=null;initLevel(0);game.state='playing';hideScreen();};
window.resumeGame =function(){SFX.resume();game.state='playing';hideScreen();};
window.nextLevel  =function(){game.currentLevel++;initLevel(game.currentLevel);game.state='playing';hideScreen();};
window.goToTitle  =function(){game.state='title';showScreen('title');};
window.showSaveMenu=function(){showScreen('savemenu');};
window.showLoadMenu=function(){showScreen('loadmenu');};
window.showWin    =function(){showScreen('win');};
window.doSave     =function(slot){game.activeSlot=slot;saveGame(slot);showScreen('paused');};
window.doLoad     =function(slot){const s=loadGame(slot);if(!s||!s.savedAt)return;game.score=s.score||0;game.coins=s.coins||0;game.lives=s.lives||3;game.currentLevel=s.level||0;game.activeSlot=slot;initLevel(game.currentLevel);game.state='playing';hideScreen();updateHUD();};

// ============================================================
// MAIN LOOP
// ============================================================
let titleCamX=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min(ts-lastTime,50);lastTime=ts;
  if(game.state==='playing'){accumulator+=dt;while(accumulator>=FIXED_STEP){updateGame();accumulator-=FIXED_STEP;}drawGame();}
  else if(game.level)drawGame();
  else if(game.state!=='loading'&&game.state!=='loaderror'){titleCamX+=.4;if(titleCamX>2000)titleCamX=0;drawSkyBG(titleCamX);}
  for(const k in justPressed)delete justPressed[k];
}

// ============================================================
// BOOT -- async level loader
// ============================================================
async function loadAllLevels(){
  showScreen('loading');
  for(let i=0;i<LEVEL_CONFIG.length;i++){
    const cfg=LEVEL_CONFIG[i];
    const el=document.getElementById('load-status');
    if(el)el.textContent=`Loading ${cfg.file} (${i+1}/${LEVEL_CONFIG.length})...`;
    try{
      const resp=await fetch(cfg.file);
      if(!resp.ok)throw new Error(`HTTP ${resp.status} for ${cfg.file}`);
      LEVEL_MARKDOWN[i]=await resp.text();
    }catch(err){
      showScreen('loaderror',{msg:`Failed to load "${cfg.file}":<br><br>${err.message}`});
      return;
    }
  }
  loadCustomLevels();
  game.state='title';
  showScreen('title');
  requestAnimationFrame(loop);
}
loadAllLevels();
</script>
