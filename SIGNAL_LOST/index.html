// ============================================================
// SEEDED PRNG  (mulberry32)
// ============================================================
let _seed = 0;
function seedRng(s) { _seed = s >>> 0; }
function rng() {
  _seed += 0x6D2B79F5;
  let t = _seed;
  t = Math.imul(t ^ t >>> 15, t | 1);
  t ^= t + Math.imul(t ^ t >>> 7, t | 61);
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}
function pick(arr) { return arr[Math.floor(rng() * arr.length)]; }
function pickN(arr, n) {
  const copy = [...arr];
  const out = [];
  for (let i = 0; i < n && copy.length; i++) {
    const idx = Math.floor(rng() * copy.length);
    out.push(copy.splice(idx, 1)[0]);
  }
  return out;
}

// Separate rng for canvas so narrative picks don't affect art and vice versa
let _seedArt = 0;
function seedArtRng(s) { _seedArt = s >>> 0; }
function artRng() {
  _seedArt += 0x6D2B79F5;
  let t = _seedArt;
  t = Math.imul(t ^ t >>> 15, t | 1);
  t ^= t + Math.imul(t ^ t >>> 7, t | 61);
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}
function artPick(arr) { return arr[Math.floor(artRng() * arr.length)]; }

// ============================================================
// SESSION SEED
// ============================================================
function getSessionSeed() {
  let s = sessionStorage.getItem('gap_seed');
  if (!s) {
    s = Math.floor(Math.random() * 0xFFFFFFFF).toString(16).padStart(8, '0');
    sessionStorage.setItem('gap_seed', s);
  }
  return s;
}

// CANVAS ART  (session-seeded variations per room)

function drawRoomArt(type, roomSeedOffset) {
  const canvas = document.getElementById('room-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth || 800;
  canvas.height = canvas.offsetHeight || 190;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Seed art rng per room + session
  seedArtRng(_seed + roomSeedOffset * 9999);

  const palette = [
    ['0,245,255', '255,0,170', '0,255,136'],
    ['255,0,170', '255,224,0', '0,245,255'],
    ['0,255,136', '0,245,255', '255,0,170'],
    ['255,224,0', '255,0,170', '0,255,136'],
  ];
  const pal = palette[Math.floor(artRng() * palette.length)];
  const c1 = pal[0], c2 = pal[1], c3 = pal[2];

  ctx.fillStyle = '#040810';
  ctx.fillRect(0, 0, w, h);

  const arts = {
    gap: () => {
      const cols = 6 + Math.floor(artRng() * 3);
      const rows = 3;
      const tw = w / cols, th = h / rows;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const x = c * tw + artRng() * 4 - 2;
          const y = r * th + artRng() * 4 - 2;
          const bw = tw - 6, bh = th - 8;
          const col = artRng() > 0.6 ? c1 : artRng() > 0.5 ? c2 : c3;
          ctx.strokeStyle = `rgba(${col},${0.15 + artRng() * 0.4})`;
          ctx.lineWidth = 1;
          ctx.strokeRect(x, y, bw, bh);
          ctx.fillStyle = `rgba(${col},0.04)`;
          ctx.fillRect(x + 1, y + 1, bw - 2, bh - 2);
          const lines = 4 + Math.floor(artRng() * 5);
          for (let s = 0; s < lines; s++) {
            const a = artRng() * 0.25;
            ctx.fillStyle = `rgba(200,220,240,${a})`;
            ctx.fillRect(x + 3, y + 4 + s * ((bh - 8) / lines), bw - 6, 1);
          }
        }
      }
      ctx.strokeStyle = `rgba(${c2},0.9)`;
      ctx.lineWidth = 2;
      const dx = w / 2 + (artRng() * 40 - 20);
      ctx.strokeRect(dx - 14, h / 2 - 22, 28, 44);
      ctx.fillStyle = `rgba(${c2},0.1)`;
      ctx.fillRect(dx - 14, h / 2 - 22, 28, 44);
    },
    archive: () => {
      const rows = 4 + Math.floor(artRng() * 2);
      const rh = h / rows;
      for (let r = 0; r < rows; r++) {
        const y = r * rh + rh * 0.85;
        ctx.strokeStyle = `rgba(${c3},0.18)`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(16, y); ctx.lineTo(w - 16, y); ctx.stroke();
        const bookW = 10 + Math.floor(artRng() * 4);
        let bx = 18;
        while (bx < w - 18) {
          const bh2 = rh * 0.4 + artRng() * rh * 0.4;
          const bw2 = bookW + artRng() * 8 - 4;
          const col = artRng() > 0.5 ? c1 : artRng() > 0.5 ? c2 : c3;
          const a = 0.12 + artRng() * 0.28;
          ctx.fillStyle = `rgba(${col},${a})`;
          ctx.fillRect(bx, y - bh2, bw2, bh2);
          ctx.strokeStyle = `rgba(${col},${a + 0.2})`;
          ctx.lineWidth = 0.5;
          ctx.strokeRect(bx, y - bh2, bw2, bh2);
          bx += bw2 + 2;
        }
      }
      const gr = ctx.createRadialGradient(w / 2 + artRng() * 60 - 30, h - 10, 0, w / 2, h - 10, 70);
      gr.addColorStop(0, `rgba(${c2},0.18)`);
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gr;
      ctx.fillRect(0, 0, w, h);
    },
    signal: () => {
      const faders = 16 + Math.floor(artRng() * 8);
      const spacing = (w - 40) / faders;
      for (let i = 0; i < faders; i++) {
        const x = 20 + i * spacing;
        const fh = (0.2 + artRng() * 0.7) * (h - 40);
        ctx.strokeStyle = `rgba(${c1},0.25)`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x, h - 18); ctx.lineTo(x, h - 18 - fh); ctx.stroke();
        ctx.fillStyle = `rgba(${c1},0.6)`;
        ctx.fillRect(x - 4, h - 18 - fh - 3, 8, 5);
      }
      const waves = 2 + Math.floor(artRng() * 2);
      for (let w2 = 0; w2 < waves; w2++) {
        const col = w2 === 0 ? c2 : c3;
        ctx.strokeStyle = `rgba(${col},${0.35 + artRng() * 0.3})`;
        ctx.lineWidth = 1.2 + artRng();
        ctx.beginPath();
        const freq = 0.03 + artRng() * 0.06;
        const amp = 10 + artRng() * 18;
        const phase = artRng() * Math.PI * 2;
        for (let x = 0; x <= w; x++) {
          const y = h * 0.45 + Math.sin(x * freq + phase) * amp + Math.sin(x * freq * 2.3) * (amp * 0.4) + (artRng() - 0.5) * 3;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    },
    sublevel: () => {
      const pipeCount = 4 + Math.floor(artRng() * 3);
      for (let i = 0; i < pipeCount; i++) {
        const y = 12 + i * ((h - 30) / pipeCount) + artRng() * 6;
        const col = i % 2 === 0 ? c3 : c1;
        const thick = 3 + artRng() * 3;
        ctx.strokeStyle = `rgba(${col},${0.15 + artRng() * 0.25})`;
        ctx.lineWidth = thick;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
        const gr = ctx.createLinearGradient(0, y - 10, 0, y + 10);
        gr.addColorStop(0, 'rgba(0,0,0,0)');
        gr.addColorStop(0.5, `rgba(${col},${0.04 + artRng() * 0.04})`);
        gr.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gr;
        ctx.fillRect(0, y - 10, w, 20);
      }
      const tx = w * 0.45 + artRng() * 60 - 30;
      const ty = h * 0.45 + artRng() * 20 - 10;
      ctx.strokeStyle = `rgba(${c1},0.45)`;
      ctx.lineWidth = 1;
      ctx.strokeRect(tx - 48, ty - 22, 96, 50);
      ctx.fillStyle = `rgba(${c1},0.03)`;
      ctx.fillRect(tx - 48, ty - 22, 96, 50);
      ctx.fillStyle = `rgba(${c1},0.7)`;
      ctx.font = '10px "Share Tech Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('> _', tx, ty + 5);
      ctx.textAlign = 'left';
    },
    mirror: () => {
      const cols = 7 + Math.floor(artRng() * 4), rows = 5 + Math.floor(artRng() * 2);
      const tw = w / cols, th = h / rows;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const col = (r + c) % 2 === 0 ? c1 : c2;
          ctx.strokeStyle = `rgba(${col},0.14)`;
          ctx.lineWidth = 0.5;
          ctx.strokeRect(c * tw, r * th, tw, th);
          const gr = ctx.createLinearGradient(c * tw, r * th, c * tw + tw, r * th + th);
          gr.addColorStop(0, `rgba(${col},0.025)`);
          gr.addColorStop(0.5, `rgba(${col},0.06)`);
          gr.addColorStop(1, `rgba(${col},0.02)`);
          ctx.fillStyle = gr;
          ctx.fillRect(c * tw, r * th, tw, th);
        }
      }
      const fx = w / 2 + artRng() * 20 - 10;
      ctx.fillStyle = 'rgba(2,4,8,0.75)';
      ctx.fillRect(fx - 10, h / 2 - 35, 20, 45);
      ctx.beginPath();
      ctx.arc(fx, h / 2 - 44, 11, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(2,4,8,0.75)';
      ctx.fill();
    },
    booth: () => {
      const gr = ctx.createRadialGradient(w / 2, 16, 0, w / 2, 16, 50);
      gr.addColorStop(0, 'rgba(220,0,0,0.45)');
      gr.addColorStop(1, 'rgba(220,0,0,0)');
      ctx.fillStyle = gr;
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = 'rgba(200,0,0,0.85)';
      ctx.fillRect(w / 2 - 32, 6, 64, 18);
      ctx.fillStyle = 'rgba(3,5,8,0.9)';
      ctx.font = 'bold 9px "Share Tech Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ON AIR', w / 2, 19);
      ctx.textAlign = 'left';
      ctx.strokeStyle = `rgba(${c1},0.18)`;
      ctx.lineWidth = 1.5;
      const gy = h * 0.5 + artRng() * 20 - 10;
      ctx.strokeRect(18, gy, w - 36, h - gy - 14);
      ctx.beginPath();
      ctx.arc(w / 2 + artRng() * 20 - 10, gy - 16, 14, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(6,8,14,0.95)';
      ctx.fill();
      ctx.strokeStyle = `rgba(${c2},0.65)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    },
    outside: () => {
      for (let i = 0; i < 220; i++) {
        const x = artRng() * w, y = artRng() * h;
        ctx.fillStyle = `rgba(200,220,240,${artRng() * 0.13})`;
        ctx.fillRect(x, y, 1, 2 + artRng() * 5);
      }
      const px = 50 + artRng() * 30;
      ctx.strokeStyle = `rgba(${c3},0.45)`;
      ctx.lineWidth = 1;
      ctx.strokeRect(px, h * 0.3, 28, 58);
      ctx.fillStyle = `rgba(${c3},0.04)`;
      ctx.fillRect(px, h * 0.3, 28, 58);
      const fy = h * 0.28 + artRng() * 20 - 10;
      const fx = w - 60 - artRng() * 40;
      ctx.fillStyle = `rgba(255,224,0,${0.4 + artRng() * 0.2})`;
      ctx.fillRect(fx, fy + 14, 14, 38);
      ctx.beginPath();
      ctx.arc(fx + 7, fy + 6, 8, 0, Math.PI * 2);
      ctx.fill();
      const lineCount = 3 + Math.floor(artRng() * 3);
      ctx.strokeStyle = `rgba(${c1},0.12)`;
      ctx.lineWidth = 1;
      for (let l = 0; l < lineCount; l++) {
        ctx.beginPath();
        ctx.moveTo(0, h * 0.55 + l * 14);
        ctx.bezierCurveTo(w * 0.33, h * 0.45 + l * 14, w * 0.66, h * 0.6 + l * 14, w, h * 0.55 + l * 14);
        ctx.stroke();
      }
    },
    engine: () => {
      const drawGear = (cx, cy, r, teeth) => {
        const col = artRng() > 0.5 ? c1 : artRng() > 0.5 ? c2 : c3;
        const a = 0.2 + artRng() * 0.25;
        ctx.strokeStyle = `rgba(${col},${a})`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
        for (let i = 0; i < teeth; i++) {
          const ang = (i / teeth) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(cx + Math.cos(ang) * r, cy + Math.sin(ang) * r);
          ctx.lineTo(cx + Math.cos(ang) * (r + 7 + artRng() * 4), cy + Math.sin(ang) * (r + 7 + artRng() * 4));
          ctx.stroke();
        }
      };
      drawGear(w * 0.18, h * 0.42, 28 + artRng() * 12, 10 + Math.floor(artRng() * 4));
      drawGear(w * 0.5, h * 0.52, 42 + artRng() * 14, 14 + Math.floor(artRng() * 4));
      drawGear(w * 0.82, h * 0.38, 24 + artRng() * 10, 9 + Math.floor(artRng() * 3));
      const pistons = 4 + Math.floor(artRng() * 3);
      for (let i = 0; i < pistons; i++) {
        const x = 28 + i * ((w - 56) / pistons);
        ctx.strokeStyle = `rgba(255,224,0,${0.15 + artRng() * 0.15})`;
        ctx.lineWidth = 2 + artRng() * 2;
        ctx.beginPath();
        ctx.moveTo(x, h - 14);
        ctx.lineTo(x, h * 0.45 + Math.sin(i * 1.3) * 18 + artRng() * 10 - 5);
        ctx.stroke();
      }
    },
    rooftop: () => {
      for (let i = 0; i < 600; i++) {
        const x = artRng() * w, y = artRng() * h * 0.65;
        const col = artRng() > 0.5 ? c1 : '200,220,240';
        ctx.fillStyle = `rgba(${col},${artRng() * 0.18})`;
        ctx.fillRect(x, y, 1.5, 1.5);
      }
      const towerCount = 3 + Math.floor(artRng() * 3);
      for (let i = 0; i < towerCount; i++) {
        const x = 40 + i * ((w - 80) / towerCount) + artRng() * 20 - 10;
        ctx.strokeStyle = `rgba(${c2},${0.18 + artRng() * 0.18})`;
        ctx.lineWidth = 1 + artRng();
        ctx.beginPath(); ctx.moveTo(x, h); ctx.lineTo(x, 8 + artRng() * 12); ctx.stroke();
        const bars = 3 + Math.floor(artRng() * 3);
        for (let j = 1; j <= bars; j++) {
          const by = h - j * (h / (bars + 1));
          const bw2 = 12 + artRng() * 10;
          ctx.beginPath(); ctx.moveTo(x - bw2, by); ctx.lineTo(x + bw2, by); ctx.stroke();
        }
      }
      const gr = ctx.createLinearGradient(0, h * 0.5, 0, h);
      gr.addColorStop(0, `rgba(${c1},0)`);
      gr.addColorStop(1, `rgba(${c1},0.07)`);
      ctx.fillStyle = gr;
      ctx.fillRect(0, 0, w, h);
    },
  };

  (arts[type] || arts.gap)();
}

// ============================================================
// STATE
// ============================================================
let state = { currentRoom: null, history: [], steps: 0 };
let SESSION_SEED_HEX = '';

// Per-room seed offsets so each room's art is independently seeded
const ROOM_OFFSETS = {
  the_gap: 1, the_archive: 2, the_signal_room: 3, sublevel_zero: 4,
  the_mirror_room: 5, the_broadcast_booth: 6, the_outside_inside: 7,
  the_engine_room: 8, the_rooftop: 9,
};

// ============================================================
// RENDER
// ============================================================
function navigateTo(roomId) {
  // Flash
  const flash = document.createElement('div');
  flash.className = 'transition-flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 400);

  const room = WORLD.rooms[roomId];
  if (!state.currentRoom || state.currentRoom !== room) {
    if (state.currentRoom) state.history.push(state.currentRoom.name);
  }
  state.currentRoom = room;
  state.steps++;

  document.getElementById('breadcrumb').textContent = room.path;
  document.getElementById('step-count').textContent = `STEPS: ${state.steps}`;

  // Seed narrative rng per room+session+step for variety
  const roomOffset = ROOM_OFFSETS[roomId] || 0;
  const numericSeed = parseInt(SESSION_SEED_HEX, 16);
  seedRng(numericSeed + roomOffset * 1337 + state.steps * 7);

  // Pick narrative passage
  const narratives = NARRATIVES[roomId] || NARRATIVES.the_gap;
  const narrative = pick(narratives);

  // Pick ambient detail
  const ambients = AMBIENT[roomId] || AMBIENT.the_gap;
  const ambient = pick(ambients);

  // Pick sigil
  const sigil = pick(SIGILS);

  // Draw room art (independent seed)
  seedArtRng(numericSeed + roomOffset * 9999);
  setTimeout(() => drawRoomArt(room.art, roomOffset), 20);

  // Render narrative
  const panel = document.getElementById('narrative-panel');
  panel.setAttribute('data-sigil', sigil);
  const narEl = document.getElementById('narrative-text');
  narEl.classList.remove('fade-in');
  void narEl.offsetWidth;
  narEl.classList.add('fade-in');
  narEl.textContent = narrative;

  // Render ambient
  const ambEl = document.getElementById('ambient-strip');
  ambEl.classList.remove('fade-in');
  void ambEl.offsetWidth;
  ambEl.classList.add('fade-in');
  ambEl.textContent = '// ' + ambient;

  // Render choices with flavor text
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const flavorSets = EXIT_FLAVORS[roomId] || [];

  room.exits.forEach((exit, idx) => {
    const flavors = flavorSets[idx] || [''];
    const flavor = pick(flavors);

    const btn = document.createElement('button');
    btn.className = 'choice-btn stagger-in';
    btn.style.animationDelay = `${idx * 0.08 + 0.2}s`;
    btn.innerHTML = `
      <div class="choice-meta">
        <span class="choice-num">0${idx + 1}</span>
        <span class="choice-icon">${exit.icon}</span>
      </div>
      <div class="choice-body">
        <span class="choice-label">${exit.label}</span>
        <span class="choice-flavor">${flavor}</span>
      </div>
    `;
    btn.onclick = () => navigateTo(exit.room);
    choicesEl.appendChild(btn);
  });
}

// ============================================================
// START
// ============================================================
function startGame() {
  SESSION_SEED_HEX = getSessionSeed();
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('visit-seed').textContent = `SESSION: ${SESSION_SEED_HEX.toUpperCase()}`;

  window.addEventListener('resize', () => {
    if (state.currentRoom) drawRoomArt(state.currentRoom.art, ROOM_OFFSETS[Object.keys(WORLD.rooms).find(k => WORLD.rooms[k] === state.currentRoom)] || 1);
  });

  navigateTo(WORLD.entrypoint);
}

// Show seed on intro
document.getElementById('intro-seed-display').textContent =
  `SESSION: ${getSessionSeed().toUpperCase()}`;
</script>
