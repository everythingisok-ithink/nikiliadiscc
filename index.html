<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8">

        rel="stylesheet">

    <style>
        /* ─── Base ─── */
        body {
            background: #0d0d0d;
            color: #e5e5e5;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            cursor: default;
            user-select: none;
        }

        /* ─── Two-layer background ─── */
        #bg-gray,
        #bg-color {
            position: fixed;
            inset: 0;
            background: url('bg.jpg') top left / 256px 256px repeat;
            pointer-events: none;
            z-index: -1;
        }

        #bg-gray {
            filter: grayscale(1) contrast(0.45);
            opacity: 0.22;
        }

        #bg-color {
            /* color layer is revealed through a radial mask centered on cursor */
            filter: brightness(0.7);
            -webkit-mask-image: radial-gradient(circle 280px at var(--mx, -999px) var(--my, -999px),
                    black 0%,
                    transparent 100%);
            mask-image: radial-gradient(circle 280px at var(--mx, -999px) var(--my, -999px),
                    black 0%,
                    transparent 100%);
        }

        /* Non-link text should not show text cursor */
        h1,
        h2,
        h3,
        p,
        div,
        span,
        header,
        main,
        section {
            cursor: default;
        }

        a,
        a *,
        button,
        [role="button"],
        #easter-egg-trigger {
            cursor: pointer;
        }

        /* ─── Pixel Dissolve Overlay ─── */
        #pixel-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            pointer-events: none;
        }

        #pixel-overlay canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        /* ─── Icon row (easter egg hidden among decorative icons) ─── */
        .icon-row {
            position: absolute;
            bottom: 1.1rem;
            right: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            z-index: 20;
        }

        .icon-row .icon-glyph {
            width: 1rem;
            height: 1rem;
            color: #6366f1;
            opacity: 0.29;
            transition: opacity 0.3s ease;
            flex-shrink: 0;
        }

        .icon-row .icon-glyph svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        #easter-egg-trigger {
            display: inline-flex;
            width: 1rem;
            height: 1rem;
            flex-shrink: 0;
            cursor: pointer;
        }

        #easter-egg-trigger .icon-glyph {
            width: 100%;
            height: 100%;
            opacity: 0.29;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #easter-egg-trigger:hover .icon-glyph {
            opacity: 0.55;
            transform: scale(1.25);
        }

        /* ─── Yellow Cursor Halo (text proximity effect) ─── */
        #cursor-halo {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: normal;
        }

        /* ─── Game Container ─── */
        #game-container {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            overflow: hidden;
            background-color: #020617;
        }

        #gameCanvas {
            display: block;
        }

        .neon-text {
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #0ea5e9, 0 0 30px #0ea5e9;
        }

        .glow-canvas {
            filter: drop-shadow(0 0 8px rgba(14, 165, 233, 0.8));
        }
    </style>
</head>

    <!-- ═══════════════════════════════════════════════
     SCRIPTS
     ═══════════════════════════════════════════════ -->
    <script>
        // ── Pixel Dissolve + Game Launch ──────────────────────────────────────────
        (() => {
            const trigger = document.getElementById('easter-egg-trigger');
            const overlay = document.getElementById('pixel-overlay');
            const dissolveC = document.getElementById('dissolve-canvas');
            const dCtx = dissolveC.getContext('2d');
            const cvContent = document.getElementById('cv-content');
            const gameEl = document.getElementById('game-container');
            const returnBtn = document.getElementById('return-btn');

            const PIXEL = 6;
            const DURATION = 1100;
            let animating = false;

            // ── Launch: dissolve → show game ──
            trigger.addEventListener('click', () => {
                if (animating) return;
                animating = true;

                dissolveC.width = window.innerWidth;
                dissolveC.height = window.innerHeight;

                const cols = Math.ceil(dissolveC.width / PIXEL);
                const rows = Math.ceil(dissolveC.height / PIXEL);
                const total = cols * rows;

                // Shuffled block indices
                const indices = Array.from({ length: total }, (_, i) => i);
                for (let i = indices.length - 1; i > 0; i--) {
                    const j = (Math.random() * (i + 1)) | 0;
                    [indices[i], indices[j]] = [indices[j], indices[i]];
                }

                overlay.style.display = 'block';
                const colours = ['#0f172a', '#111827', '#0d1117', '#020617', '#0a0a1a'];
                const start = performance.now();

                function step(now) {
                    const progress = Math.min((now - start) / DURATION, 1);
                    const reveal = (progress * total) | 0;
                    const prev = (Math.max(0, progress - 16 / DURATION) * total) | 0;

                    for (let i = prev; i < reveal; i++) {
                        if (i >= total) break;
                        const idx = indices[i];
                        const col = idx % cols;
                        const row = (idx / cols) | 0;
                        dCtx.fillStyle = colours[(Math.random() * colours.length) | 0];
                        dCtx.fillRect(col * PIXEL, row * PIXEL, PIXEL, PIXEL);
                    }

                    if (progress < 1) {
                        requestAnimationFrame(step);
                    } else {
                        // Fully dark — switch views
                        cvContent.style.display = 'none';
                        overlay.style.display = 'none';
                        gameEl.style.display = 'block';
                        initGame();
                        animating = false;
                    }
                }

                requestAnimationFrame(step);
            });

            // ── Exit dissolve: fill dark overlay, swap views behind it, then pixel-clear to reveal CV ──
            function dissolveExit() {
                dissolveC.width = window.innerWidth;
                dissolveC.height = window.innerHeight;
                const cols = Math.ceil(dissolveC.width / PIXEL);
                const rows = Math.ceil(dissolveC.height / PIXEL);
                const total = cols * rows;

                // 1. Paint the overlay fully dark — covers the game instantly
                dCtx.fillStyle = '#020617';
                dCtx.fillRect(0, 0, dissolveC.width, dissolveC.height);
                // overlay z-index sits above both CV and game
                overlay.style.display = 'block';

                // 2. Now that the dark overlay hides everything, swap the layers:
                //    hide game, show CV — neither is visible yet
                gameEl.style.display = 'none';
                cvContent.style.display = '';

                // 3. Shuffle block indices
                const indices = Array.from({ length: total }, (_, i) => i);
                for (let i = indices.length - 1; i > 0; i--) {
                    const j = (Math.random() * (i + 1)) | 0;
                    [indices[i], indices[j]] = [indices[j], indices[i]];
                }

                const REVEAL_DUR = 950;
                const start = performance.now();

                // 4. Clear (erase) blocks to reveal the CV below
                function stepOut(now) {
                    const progress = Math.min((now - start) / REVEAL_DUR, 1);
                    const reveal = (progress * total) | 0;
                    const prev = (Math.max(0, progress - 16 / REVEAL_DUR) * total) | 0;
                    for (let i = prev; i < reveal; i++) {
                        if (i >= total) break;
                        const idx = indices[i];
                        const col = idx % cols;
                        const row = (idx / cols) | 0;
                        dCtx.clearRect(col * PIXEL, row * PIXEL, PIXEL, PIXEL);
                    }
                    if (progress < 1) {
                        requestAnimationFrame(stepOut);
                    } else {
                        overlay.style.display = 'none';
                    }
                }
                requestAnimationFrame(stepOut);
            }

            // ── Return: stop game → dissolve exit ──
            returnBtn.addEventListener('click', () => {
                stopGame();
                dissolveExit();
            });
        })();

        // ── Space Shooter Game Engine ─────────────────────────────────────────────
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('game-score');
        const instructions = document.getElementById('game-instructions');

        let width, height;
        let score = 0;
        let gameActive = false;
        let animFrameId;

        const player = { x: 0, y: 0, size: 20, color: '#0ea5e9' };
        let projectiles = [];
        let enemies = [];
        let particles = [];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            player.x = width / 2;
            player.y = height - 100;
        }

        window.addEventListener('resize', resize);

        // Mouse tracking
        window.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            player.x = e.clientX;
            player.y = e.clientY;
            if (instructions.style.opacity !== '0') instructions.style.opacity = '0';
        });

        // Shooting
        window.addEventListener('mousedown', () => {
            if (!gameActive) return;
            projectiles.push({ x: player.x, y: player.y - 15, speed: 12, radius: 3 });
        });

        class Enemy {
            constructor() {
                this.size = Math.random() * 20 + 10;
                this.x = Math.random() * width;
                this.y = -this.size;
                this.speed = Math.random() * 2 + 1;
                this.points = (this.size * 10) | 0;
                this.color = '#ef4444';
            }
            update() { this.y += this.speed; }
            draw() {
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - this.size);
                ctx.lineTo(this.x + this.size, this.y);
                ctx.lineTo(this.x, this.y + this.size);
                ctx.lineTo(this.x - this.size, this.y);
                ctx.closePath();
                ctx.stroke();
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    alpha: 1, color
                });
            }
        }

        function updateScore() {
            scoreEl.innerText = score.toString().padStart(6, '0');
        }

        function animate() {
            // Background with trail
            ctx.fillStyle = 'rgba(2, 6, 23, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Starfield
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            for (let i = 0; i < 10; i++) {
                ctx.fillRect(Math.random() * width, Math.random() * height, 1, 1);
            }

            // Player ship
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.strokeStyle = player.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - 20);
            ctx.lineTo(player.x + 15, player.y + 15);
            ctx.lineTo(player.x, player.y + 5);
            ctx.lineTo(player.x - 15, player.y + 15);
            ctx.closePath();
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Projectiles
            projectiles.forEach((p, i) => {
                p.y -= p.speed;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                if (p.y < 0) projectiles.splice(i, 1);
            });

            // Enemies
            enemies.forEach((enemy, eIdx) => {
                enemy.update();
                enemy.draw();

                // Bullet collision
                projectiles.forEach((p, pIdx) => {
                    if (Math.hypot(p.x - enemy.x, p.y - enemy.y) < enemy.size + p.radius) {
                        createExplosion(enemy.x, enemy.y, enemy.color);
                        score += enemy.points;
                        updateScore();
                        enemies.splice(eIdx, 1);
                        projectiles.splice(pIdx, 1);
                    }
                });

                // Player collision
                if (Math.hypot(player.x - enemy.x, player.y - enemy.y) < enemy.size + 15) {
                    score = Math.max(0, score - 500);
                    updateScore();
                    createExplosion(player.x, player.y, '#fff');
                    enemies.splice(eIdx, 1);
                }

                if (enemy.y > height + 50) enemies.splice(eIdx, 1);
            });

            // Spawn
            if (Math.random() < 0.03) enemies.push(new Enemy());

            // Particles
            particles.forEach((part, i) => {
                part.x += part.vx;
                part.y += part.vy;
                part.alpha -= 0.02;
                ctx.globalAlpha = part.alpha;
                ctx.fillStyle = part.color;
                ctx.fillRect(part.x, part.y, 2, 2);
                ctx.globalAlpha = 1;
                if (part.alpha <= 0) particles.splice(i, 1);
            });

            if (gameActive) animFrameId = requestAnimationFrame(animate);
        }

        function initGame() {
            score = 0;
            gameActive = true;
            projectiles = [];
            enemies = [];
            particles = [];
            instructions.style.opacity = '1';

            resize();
            updateScore();

            // Clear canvas
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, width, height);

            animFrameId = requestAnimationFrame(animate);
        }

        function stopGame() {
            gameActive = false;
            if (animFrameId) cancelAnimationFrame(animFrameId);
        }
    </script>

    <!-- ── Pink Cursor Text Halo ──────────────────────────────────────────── -->
    <script>
        (() => {
            const RADIUS = 55;           // effect radius in px
            const PINK = [234, 255, 0]; // neon yellow

            // We walk the text nodes under #cv-content and colour characters
            // near the cursor hot-pink, fading to normal outside the radius.
            // Technique: wrap every character in a <span>, then on mousemove
            // update their color based on distance.

            const root = document.getElementById('cv-content');

            // Gather all text-bearing leaf nodes we want to affect
            const textSelectors = ['h1', 'p', 'a', 'div > p', 'nav a'];
            const spans = [];

            function wrapTextNodes(el) {
                // Walk child nodes; wrap text nodes char-by-char
                const childNodes = Array.from(el.childNodes);
                childNodes.forEach(node => {
                    if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) {
                        const frag = document.createDocumentFragment();
                        [...node.textContent].forEach(ch => {
                            const s = document.createElement('span');
                            s.className = 'halo-char';
                            s.textContent = ch;
                            s.style.transition = 'color 0.08s linear';
                            s.style.display = 'inline';
                            frag.appendChild(s);
                            spans.push(s);
                        });
                        node.replaceWith(frag);
                    } else if (node.nodeType === Node.ELEMENT_NODE &&
                        !node.closest('#easter-egg-trigger') &&
                        node.tagName !== 'IMG') {
                        wrapTextNodes(node);
                    }
                });
            }

            wrapTextNodes(root);

            let mx = -9999, my = -9999;

            document.addEventListener('mousemove', e => {
                mx = e.clientX;
                my = e.clientY;
            });

            function haloTick() {
                if (document.getElementById('game-container').style.display === 'block') {
                    requestAnimationFrame(haloTick);
                    return;
                }
                spans.forEach(s => {
                    const r = s.getBoundingClientRect();
                    const cx = r.left + r.width / 2;
                    const cy = r.top + r.height / 2;
                    const d = Math.hypot(mx - cx, my - cy);
                    if (d < RADIUS) {
                        const t = 1 - d / RADIUS;
                        const [pr, pg, pb] = PINK;
                        const alpha = t * t; // quadratic falloff
                        // Lerp from white (255,255,255) → neon yellow — always full opacity,
                        // so text is never dark or illegible at the edges of the halo
                        const r = Math.round(255 + (pr - 255) * alpha) | 0;
                        const g = Math.round(255 + (pg - 255) * alpha) | 0;
                        const b = Math.round(255 + (pb - 255) * alpha) | 0;
                        s.style.color = `rgb(${r},${g},${b})`;
                        // Glow: pure yellow shadow, blur scales with proximity
                        s.style.textShadow = alpha > 0.1 ? [
                            `0 0 ${6 * alpha}px rgba(${pr},${pg},${pb},${alpha})`,
                            `0 0 ${16 * alpha}px rgba(${pr},${pg},${pb},${alpha * 0.6})`
                        ].join(',') : '';
                    } else {
                        s.style.color = '';
                        s.style.textShadow = '';
                    }
                });
                // Glyph halo — treat each .icon-glyph like a text span
                // Base color: indigo #6366f1 = [99, 102, 241]
                // SVGs inside use fill:currentColor, so changing `color` cascades through
                const BASE_G = [99, 102, 241];
                const BASE_OPACITY = 0.29;
                document.querySelectorAll('.icon-glyph').forEach(g => {
                    const gr = g.getBoundingClientRect();
                    const gcx = gr.left + gr.width / 2;
                    const gcy = gr.top + gr.height / 2;
                    const gd = Math.hypot(mx - gcx, my - gcy);
                    if (gd < RADIUS) {
                        const gt = 1 - gd / RADIUS;
                        const ga = gt * gt;
                        const [pr, pg, pb] = PINK;
                        const gr2 = Math.round(BASE_G[0] + (pr - BASE_G[0]) * ga) | 0;
                        const gg = Math.round(BASE_G[1] + (pg - BASE_G[1]) * ga) | 0;
                        const gb = Math.round(BASE_G[2] + (pb - BASE_G[2]) * ga) | 0;
                        g.style.color = `rgb(${gr2},${gg},${gb})`;
                        g.style.opacity = BASE_OPACITY + (1 - BASE_OPACITY) * ga;
                        g.style.filter = ga > 0.1
                            ? `drop-shadow(0 0 ${5 * ga}px rgba(${pr},${pg},${pb},${ga}))`
                            : '';
                    } else {
                        g.style.color = '';
                        g.style.opacity = '';
                        g.style.filter = '';
                    }
                });
                const poly = document.getElementById('skyline-poly');
                if (poly) {
                    const pr2 = poly.getBoundingClientRect();
                    const pcx = pr2.left + pr2.width / 2;
                    const pcy = pr2.top + pr2.height / 2;
                    const pd = Math.hypot(mx - pcx, my - pcy);
                    const SKYLINE_R = RADIUS * 3; // wider reach for the whole SVG
                    if (pd < SKYLINE_R) {
                        const pt = 1 - pd / SKYLINE_R;
                        const pa = pt * pt;
                        const [pr, pg, pb] = PINK;
                        const sr = Math.round(255 + (pr - 255) * pa) | 0;
                        const sg = Math.round(255 + (pg - 255) * pa) | 0;
                        const sb = Math.round(255 + (pb - 255) * pa) | 0;
                        poly.setAttribute('stroke', `rgb(${sr},${sg},${sb})`);
                        if (pa > 0.05) {
                            poly.style.filter = `drop-shadow(0 0 ${4 * pa}px rgba(${pr},${pg},${pb},${pa}))`;
                        } else {
                            poly.style.filter = '';
                        }
                    } else {
                        poly.setAttribute('stroke', 'white');
                        poly.style.filter = '';
                    }
                }
                requestAnimationFrame(haloTick);
            }

            requestAnimationFrame(haloTick);
        })();
    </script>
    <!-- Background color-reveal: update CSS custom props on mouse move -->
    <script>
        (() => {
            const bgColor = document.getElementById('bg-color');
            document.addEventListener('mousemove', e => {
                bgColor.style.setProperty('--mx', e.clientX + 'px');
                bgColor.style.setProperty('--my', e.clientY + 'px');
            });
            // Hide spotlight when mouse leaves the window
            document.addEventListener('mouseleave', () => {
                bgColor.style.setProperty('--mx', '-999px');
                bgColor.style.setProperty('--my', '-999px');
            });
        })();
    </script>
